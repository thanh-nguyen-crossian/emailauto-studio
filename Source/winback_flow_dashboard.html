<title>Winback Flow Dashboard — RMKT</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f4f3ef;color:#1a1917;font-size:14px}
header{background:#1a1917;color:#f4f3ef;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:19px;font-weight:600;letter-spacing:-.3px}
header span{font-size:11px;opacity:.5}
.container{max-width:1340px;margin:0 auto;padding:20px}
/* brand tabs */
.brand-tabs{display:flex;gap:4px;margin-bottom:16px;background:#e8e6e0;border-radius:10px;padding:4px}
.brand-tab{flex:1;padding:9px 0;text-align:center;border-radius:7px;cursor:pointer;font-weight:500;font-size:13px;color:#6b6560;transition:all .15s}
.brand-tab.active{background:#1a1917;color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
/* step pills */
.step-pills{display:flex;gap:6px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.step-label{font-size:12px;color:#888;font-weight:500;margin-right:2px}
.step-pill{padding:5px 13px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;border:2px solid transparent;transition:all .15s;position:relative}
.step-pill.total{color:#1a1917;border-color:#d0cdc5}
.step-pill.total.active{background:#1a1917;color:#fff;border-color:#1a1917}
.step-pill.e1{color:#2563eb;border-color:#bfdbfe}
.step-pill.e1.active{background:#2563eb;color:#fff}
.step-pill.e2{color:#7c3aed;border-color:#ddd6fe}
.step-pill.e2.active{background:#7c3aed;color:#fff}
.step-pill.e3{color:#0d9488;border-color:#99f6e4}
.step-pill.e3.active{background:#0d9488;color:#fff}
.step-pill.e4{color:#ea580c;border-color:#fed7aa}
.step-pill.e4.active{background:#ea580c;color:#fff}
.new-badge{display:inline-block;font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:#fef3c7;color:#b45309;vertical-align:middle;margin-left:4px;letter-spacing:.3px}
/* kpi strip */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.kpi-card{background:#fff;border-radius:10px;padding:13px 15px;border:1px solid #e8e6e0}
.kpi-lbl{font-size:10.5px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.kpi-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:700;letter-spacing:-1px}
.kpi-delta{font-size:12px;font-weight:600;margin-top:3px}
.kpi-delta.up{color:#16a34a}.kpi-delta.dn{color:#dc2626}.kpi-delta.fl{color:#888}
/* section tabs */
.section-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid #e8e6e0}
.section-tab{padding:9px 16px;cursor:pointer;font-weight:500;font-size:13px;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.section-tab.active{color:#1a1917;border-bottom-color:#1a1917}
/* panels */
.panel{display:none}.panel.active{display:block}
/* cards */
.card{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid #e8e6e0;margin-bottom:14px}
.card-title{font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
/* grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.chart-wrap{background:#fff;border-radius:12px;padding:16px 18px;border:1px solid #e8e6e0}
.chart-wrap h4{font-size:11.5px;font-weight:600;color:#777;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.chart-wrap canvas{max-height:200px}
/* tables */
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{background:#f4f3ef}
th{padding:8px 9px;text-align:right;font-weight:600;color:#666;font-size:11.5px;white-space:nowrap}
th:first-child{text-align:left}
td{padding:7px 9px;text-align:right;border-bottom:1px solid #f0ede8;font-family:'DM Mono',monospace}
td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-weight:500}
tr:last-child td{border-bottom:none}
tr.y26{background:#eff6ff}
tr.new26{background:#fff7ed}
tr:hover{background:#f9f8f6}
/* factor table */
.verd-imp{color:#16a34a;font-weight:700}.verd-deg{color:#dc2626;font-weight:700}.verd-flat{color:#888}
/* no-yoy banner */
.no-yoy{background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:#92400e}
/* step strip */
.step-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.step-strip-card{background:#fff;border-radius:10px;padding:13px;border:1px solid #e8e6e0;border-top:3px solid}
.step-strip-card.e1{border-top-color:#2563eb}
.step-strip-card.e2{border-top-color:#7c3aed}
.step-strip-card.e3{border-top-color:#0d9488}
.step-strip-card.e4{border-top-color:#ea580c}
.step-strip-card h5{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.step-strip-card.e1 h5{color:#2563eb}.step-strip-card.e2 h5{color:#7c3aed}
.step-strip-card.e3 h5{color:#0d9488}.step-strip-card.e4 h5{color:#ea580c}
/* funnel */
.funnel-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.funnel-lbl{font-size:12px;font-weight:600;width:65px;flex-shrink:0}
.funnel-bar-wrap{flex:1;background:#f0ede8;border-radius:4px;height:22px;overflow:hidden}
.funnel-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600;color:#fff;font-family:'DM Mono',monospace;min-width:30px;transition:width .4s}
.funnel-arrow{font-size:11px;color:#dc2626;font-weight:700;width:55px;text-align:right;flex-shrink:0}
@media(max-width:900px){.kpi-strip{grid-template-columns:repeat(3,1fr)}.g2,.g3{grid-template-columns:1fr}.step-strip{grid-template-columns:1fr 1fr}}

/* reco cards */
.reco-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;margin-bottom:14px}
.reco-card{background:#fff;border-radius:10px;padding:16px;border:1px solid #e8e6e0;border-top:3px solid #2563eb}
.reco-card:nth-child(2){border-top-color:#7c3aed}
.reco-card:nth-child(3){border-top-color:#0d9488}
.reco-card h5{font-size:13px;font-weight:700;margin-bottom:5px;color:#1a1917}
.reco-card .meta{font-size:11px;color:#888;margin-bottom:7px;font-family:'DM Mono',monospace}
.reco-card p{font-size:12px;color:#555;line-height:1.55}
.reco-card .action{font-size:12px;color:#333;margin-top:7px}<br>.reco-card .action strong{color:#1a1917}
.reco-card .impact{font-size:11px;font-weight:700;color:#16a34a;margin-top:8px;font-family:'DM Mono',monospace}
.bneck-box{background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:13px 16px;margin-bottom:14px;font-size:13px;line-height:1.5}
.bneck-box strong{color:#ea580c}
.impact-tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:10px}
.impact-tbl th{padding:8px 10px;background:#f4f3ef;font-weight:600;color:#666;text-align:left;font-size:11.5px}
.impact-tbl td{padding:7px 10px;border-bottom:1px solid #f0ede8}
.impact-tbl tr:last-child td{border-bottom:none}
</style>
</head>

const vFmt = (v,f) => {
  if(v===null||v===undefined) return '—';
  if(f==='pct') return (v*100).toFixed(1)+'%';
  if(f==='pct2') return (v*100).toFixed(2)+'%';
  if(f==='aov') return '$'+v.toFixed(2);
  return v.toFixed(3);
};
const mLabel = m => { const[y,mo]=m.split('-'); return ML[+mo-1]+"'"+(y.slice(2)); };
const isNew = s => NEW_STEPS.includes(s);
const destroyChart = id => { if(charts[id]){charts[id].destroy();delete charts[id];} };

function getRows() {
  const d = DATA[domain];
  if(step==='Total') return d.total;
  return d.monthly.filter(r=>r.step===step);
}

// ── KPI STRIP ──────────────────────────────────────────────────────────────
function renderKPI(){
  const k = DATA[domain].kpi[step];
  const noYoY = !k.has_yoy;
  const items = [
    {l:'CBH Jan–Mar 2026', v:'$'+Math.round(k.cbh_26).toLocaleString(), d:k.cbh_pct},
    {l:'Delivered Jan–Mar 2026', v:Math.round(k.delivered_26).toLocaleString(), d:k.delivered_pct},
    {l:'Open Rate 2026', v:k.open_rate_26+'%', d:k.open_rate_pct},
    {l:'Access Rate 2026', v:k.access_rate_26+'%', d:k.access_rate_pct},
    {l:'CBH/1K 2026', v:k.cbh_1k_26, d:k.cbh_1k_pct},
  ];
  $('kpiStrip').innerHTML = items.map(i=>`<div class="kpi-card">
    <div class="kpi-lbl">${i.l}</div>
    <div class="kpi-val">${i.v}</div>
    ${noYoY?'<span style="font-size:10px;color:#b45309;font-weight:600">2026 only — no prior year</span>':delta(i.d)}
  </div>`).join('');
}

// ── YOY SECTION ────────────────────────────────────────────────────────────
function renderYoY(){
  const rows = getRows().slice().sort((a,b)=>a.month.localeCompare(b.month));
  const m25 = rows.filter(r=>r.year===2025);
  const m26 = rows.filter(r=>r.year===2026);
  const labels = ML;
  const col = STEP_COLORS[step]||'#1a1917';
  const cbh25 = labels.map((_,i)=>{const r=m25.find(r=>r.month_num===i+1);return r?r.cbh:null;});
  const cbh26 = labels.map((_,i)=>{const r=m26.find(r=>r.month_num===i+1);return r?r.cbh:null;});
  const cbh1k25 = labels.map((_,i)=>{const r=m25.find(r=>r.month_num===i+1);return r?r.cbh_per_1k:null;});
  const cbh1k26 = labels.map((_,i)=>{const r=m26.find(r=>r.month_num===i+1);return r?r.cbh_per_1k:null;});

  let html = '';
  if(isNew(step)) html += `<div class="no-yoy">⚠️ <strong>${step}</strong> launched in 2026 — no 2025 baseline exists. All metrics below are 2026 only. Volume appears large because this was a batch send to all previously un-emailed lapsed subscribers, not an incremental drip.</div>`;

  // Step breakdown strip (only for Total view)
  if(step==='Total'){
    html += '<div class="step-strip">';
    ['Email 1','Email 2','Email 3','Email 4'].forEach((st,i)=>{
      const cls = ['e1','e2','e3','e4'][i];
      const sub = DATA[domain].monthly.filter(r=>r.step===st);
      const cbh25t = sub.filter(r=>r.year===2025).reduce((s,r)=>s+r.cbh,0);
      const cbh26t = sub.filter(r=>r.year===2026).reduce((s,r)=>s+r.cbh,0);
      const del_all = sub.reduce((s,r)=>s+r.Delivered,0);
      const badge = isNew(st)?'<span class="new-badge">NEW</span>':'';
      html += `<div class="step-strip-card ${cls}">
        <h5>${st} ${badge}</h5>
        <div style="font-size:11px;color:#888;margin-bottom:3px">Total Delivered: ${del_all.toLocaleString()}</div>
        <div style="font-family:'DM Mono';font-size:17px;font-weight:700">${cbh25t>0?'$'+Math.round(cbh25t).toLocaleString():'—'}</div>
        <div style="font-size:11px;color:#666;margin-top:2px">${isNew(st)?'No 2025 data':'2025 total CBH'}</div>
        <div style="font-size:12px;margin-top:6px;font-weight:600;color:${cbh26t>=cbh25t||cbh25t===0?'#16a34a':'#dc2626'}">
          2026 YTD: $${Math.round(cbh26t).toLocaleString()}
        </div>
      </div>`;
    });
    html += '</div>';
  }

  html += `<div class="g2">
    <div class="chart-wrap"><h4>Monthly CBH ($)</h4><canvas id="cYoYCbh"></canvas></div>
    <div class="chart-wrap"><h4>CBH/1K Efficiency</h4><canvas id="cYoY1k"></canvas></div>
  </div>
  <div class="card"><div class="card-title">Monthly Detail Table</div><div id="yoyTable"></div></div>`;

  $('panel-yoy').innerHTML = html;

  destroyChart('cYoYCbh'); destroyChart('cYoY1k');

  if(!isNew(step)){
    charts['cYoYCbh'] = new Chart($('cYoYCbh'), {type:'bar',data:{labels,datasets:[
      {label:'2025',data:cbh25,backgroundColor:'#d0cdc5',borderRadius:3},
      {label:'2026',data:cbh26,backgroundColor:col,borderRadius:3},
    ]},options:{responsive:true,plugins:{legend:{labels:{font:{family:'DM Sans'},boxWidth:10}}},
      scales:{x:{ticks:{font:{family:'DM Sans',size:11}}},y:{ticks:{font:{family:'DM Mono',size:10},callback:v=>'$'+Math.round(v)}}}}});
    charts['cYoY1k'] = new Chart($('cYoY1k'), {type:'line',data:{labels,datasets:[
      {label:'2025',data:cbh1k25,borderColor:'#d0cdc5',tension:0.3,pointRadius:3,borderWidth:2},
      {label:'2026',data:cbh1k26,borderColor:col,tension:0.3,pointRadius:3,borderWidth:2},
    ]},options:{responsive:true,plugins:{legend:{labels:{font:{family:'DM Sans'},boxWidth:10}}},
      scales:{x:{ticks:{font:{family:'DM Sans',size:11}}},y:{ticks:{font:{family:'DM Mono',size:10}}}}}});
  } else {
    // 2026 only chart
    charts['cYoYCbh'] = new Chart($('cYoYCbh'), {type:'bar',data:{labels,datasets:[
      {label:'2026',data:cbh26,backgroundColor:col,borderRadius:3},
    ]},options:{responsive:true,plugins:{legend:{labels:{font:{family:'DM Sans'},boxWidth:10}}},
      scales:{x:{ticks:{font:{family:'DM Sans',size:11}}},y:{ticks:{font:{family:'DM Mono',size:10},callback:v=>'$'+Math.round(v)}}}}});
    charts['cYoY1k'] = new Chart($('cYoY1k'), {type:'line',data:{labels,datasets:[
      {label:'2026 CBH/1K',data:cbh1k26,borderColor:col,tension:0.3,pointRadius:3,borderWidth:2},
    ]},options:{responsive:true,plugins:{legend:{labels:{font:{family:'DM Sans'},boxWidth:10}}},
      scales:{x:{ticks:{font:{family:'DM Sans',size:11}}},y:{ticks:{font:{family:'DM Mono',size:10}}}}}});
  }

  // Table
  let prev = null;
  let th = `<table><thead><tr>
    <th>Month</th><th>Delivered</th><th>CBH</th><th>CBH/1K</th><th>Open Rate</th><th>Access Rate</th><th>View Rate</th><th>Init Co Rate</th><th>Conv Rate</th><th>AOV</th>
  </tr></thead><tbody>`;
  rows.forEach(r=>{
    const cl = r.year===2026?(isNew(step)?'new26':'y26'):'';
    const yoy = (!isNew(step) && prev && prev.year===2025 && r.year===2026 && r.month_num===prev.month_num && prev.cbh)
      ? ((r.cbh-prev.cbh)/Math.abs(prev.cbh)*100).toFixed(1) : null;
    th+=`<tr class="${cl}">
      <td>${mLabel(r.month)}${r.year===2026&&isNew(step)?'<span class="new-badge">2026</span>':''}</td>
      <td>${r.Delivered.toLocaleString()}</td>
      <td>$${Math.round(r.cbh).toLocaleString()} ${yoy!==null?pBadge(+yoy):''}</td>
      <td>${fmtN(r.cbh_per_1k,'dec')}</td>
      <td>${fmtN(r.open_rate,'pct')}</td>
      <td>${fmtN(r.access_rate,'pct2')}</td>
      <td>${fmtN(r.view_rate,'pct')}</td>
      <td>${fmtN(r.initco_rate,'pct')}</td>
      <td>${fmtN(r.conv_rate,'pct')}</td>
      <td>${fmtN(r.AOV,'aov')}</td>
    </tr>`;
    prev = r;
  });
  th += '</tbody></table>';
  $('yoyTable').innerHTML = th;
}

// ── DECOMP SECTION ─────────────────────────────────────────────────────────
function renderDecomp(){
  if(isNew(step)){
    $('panel-decomp').innerHTML = `<div class="no-yoy">⚠️ <strong>${step}</strong> launched in 2026 only — no 2025 baseline to compare against. Showing raw 2026 funnel metrics below.</div>
    <div class="card"><div class="card-title">2026 Monthly Funnel — ${step}</div><div id="decompRawTable"></div></div>`;
    renderRawFunnelTable();
    return;
  }

  const ft = DATA[domain].factor_tables[step] || DATA[domain].factor_tables['Email 1'];
  const rows = getRows().slice().sort((a,b)=>a.month.localeCompare(b.month));
  const labels = rows.map(r=>mLabel(r.month));
  const col = STEP_COLORS[step];

  $('panel-decomp').innerHTML = `
    <div class="card"><div class="card-title">Factor Table — Monthly Medians 2025 vs 2026</div><div id="factorTbl"></div></div>
    <div class="g3" id="decompCharts"></div>
    <div class="card"><div class="card-title">Monthly Funnel Table</div><div id="funnelTbl"></div></div>
  `;

  // Factor table
  let fh = `<table><thead><tr><th>Factor</th><th>2025 Median</th><th>2026 Median</th><th>Trend</th><th>Verdict</th></tr></thead><tbody>`;
  ft.forEach(r=>{fh+=`<tr><td>${r.factor}</td><td>${vFmt(r.v25,r.fmt)}</td><td>${vFmt(r.v26,r.fmt)}</td>
    <td style="font-size:16px;text-align:center">${r.direction}</td>
    <td class="${vClass(r.verdict)}">${r.verdict}</td></tr>`;});
  fh += '</tbody></table>';
  $('factorTbl').innerHTML = fh;

  // 3 charts
  $('decompCharts').innerHTML = `
    <div class="chart-wrap"><h4>CBH/1K & Access Rate</h4><canvas id="dc1"></canvas></div>
    <div class="chart-wrap"><h4>Open Rate & Init Co Rate</h4><canvas id="dc2"></canvas></div>
    <div class="chart-wrap"><h4>AOV & Conv Rate</h4><canvas id="dc3"></canvas></div>
  `;
  const g = k => rows.map(r=>r[k]??null);
  const gp = k => rows.map(r=>r[k]!=null?r[k]*100:null);

  ['dc1','dc2','dc3'].forEach(id=>destroyChart(id));
  charts['dc1'] = new Chart($('dc1'),{type:'line',data:{labels,datasets:[
    {label:'CBH/1K',data:g('cbh_per_1k'),borderColor:col,tension:0.3,pointRadius:2,yAxisID:'y'},
    {label:'Access Rate %',data:gp('access_rate'),borderColor:'#db2777',tension:0.3,pointRadius:2,yAxisID:'y2'},
  ]},options:{responsive:true,plugins:{legend:{labels:{font:{family:'DM Sans',size:10},boxWidth:8}}},
    scales:{x:{ticks:{font:{size:9},maxRotation:45},grid:{display:false}},
      y:{ticks:{font:{family:'DM Mono',size:9}}},
      y2:{position:'right',ticks:{font:{family:'DM Mono',size:9},callback:v=>v.toFixed(2)+'%'},grid:{display:false}}}}});
  charts['dc2'] = new Chart($('dc2'),{type:'line',data:{labels,datasets:[
    {label:'Open Rate %',data:gp('open_rate'),borderColor:'#7c3aed',tension:0.3,pointRadius:2,yAxisID:'y'},
    {label:'Init Co Rate %',data:gp('initco_rate'),borderColor:'#f59e0b',tension:0.3,pointRadius:2,yAxisID:'y2'},
  ]},options:{responsive:true,plugins:{legend:{labels:{font:{family:'DM Sans',size:10},boxWidth:8}}},
    scales:{x:{ticks:{font:{size:9},maxRotation:45},grid:{display:false}},
      y:{ticks:{font:{family:'DM Mono',size:9},callback:v=>v.toFixed(1)+'%'}},
      y2:{position:'right',ticks:{font:{family:'DM Mono',size:9},callback:v=>v.toFixed(2)+'%'},grid:{display:false}}}}});
  charts['dc3'] = new Chart($('dc3'),{type:'line',data:{labels,datasets:[
    {label:'AOV $',data:g('AOV'),borderColor:'#0d9488',tension:0.3,pointRadius:2,yAxisID:'y'},
    {label:'Conv Rate %',data:gp('conv_rate'),borderColor:'#16a34a',tension:0.3,pointRadius:2,yAxisID:'y2'},
  ]},options:{responsive:true,plugins:{legend:{labels:{font:{family:'DM Sans',size:10},boxWidth:8}}},
    scales:{x:{ticks:{font:{size:9},maxRotation:45},grid:{display:false}},
      y:{ticks:{font:{family:'DM Mono',size:9},callback:v=>'$'+v.toFixed(1)}},
      y2:{position:'right',ticks:{font:{family:'DM Mono',size:9},callback:v=>v.toFixed(1)+'%'},grid:{display:false}}}}});

  // Funnel table
  let prev=null;
  let funnelHtml = `<table><thead><tr>
    <th>Month</th><th>Delivered</th><th>Open Rate</th><th>Access Rate</th><th>View Rate</th><th>Init Co Rate</th><th>Co Rate</th><th>Conv Rate</th><th>AOV</th><th>CBH/1K</th><th>Optout</th>
  </tr></thead><tbody>`;
  rows.forEach(r=>{
    const cl = r.year===2026?'y26':'';
    funnelHtml+=`<tr class="${cl}">
      <td>${mLabel(r.month)}</td>
      <td>${r.Delivered.toLocaleString()}</td>
      <td>${fmtN(r.open_rate,'pct')} ${prev?arrow(r.open_rate,prev.open_rate):''}</td>
      <td>${fmtN(r.access_rate,'pct2')} ${prev?arrow(r.access_rate,prev.access_rate):''}</td>
      <td>${fmtN(r.view_rate,'pct')}</td>
      <td>${fmtN(r.initco_rate,'pct')} ${prev?arrow(r.initco_rate,prev.initco_rate):''}</td>
      <td>${fmtN(r.co_rate,'pct')}</td>
      <td>${fmtN(r.conv_rate,'pct')}</td>
      <td>${fmtN(r.AOV,'aov')}</td>
      <td>${fmtN(r.cbh_per_1k,'dec')} ${prev?arrow(r.cbh_per_1k,prev.cbh_per_1k):''}</td>
      <td>${fmtN(r.optout_rate,'pct2')}</td>
    </tr>`;
    prev=r;
  });
  funnelHtml+='</tbody></table>';
  $('funnelTbl').innerHTML = funnelHtml;
}

function renderRawFunnelTable(){
  const rows = getRows().filter(r=>r.year===2026).slice().sort((a,b)=>a.month.localeCompare(b.month));
  let prev=null;
  let h=`<table><thead><tr><th>Month</th><th>Delivered</th><th>Open Rate</th><th>Access Rate</th><th>View Rate</th><th>Init Co Rate</th><th>Conv Rate</th><th>AOV</th><th>CBH/1K</th></tr></thead><tbody>`;
  rows.forEach(r=>{
    h+=`<tr class="new26">
      <td>${mLabel(r.month)}</td><td>${r.Delivered.toLocaleString()}</td>
      <td>${fmtN(r.open_rate,'pct')}</td><td>${fmtN(r.access_rate,'pct2')}</td>
      <td>${fmtN(r.view_rate,'pct')}</td><td>${fmtN(r.initco_rate,'pct')}</td>
      <td>${fmtN(r.conv_rate,'pct')}</td><td>${fmtN(r.AOV,'aov')}</td>
      <td>${fmtN(r.cbh_per_1k,'dec')}</td>
    </tr>`;
    prev=r;
  });
  h+='</tbody></table>';
  $('decompRawTable').innerHTML=h;
}

// ── FUNNEL DROP-OFF ────────────────────────────────────────────────────────
function renderFunnel(){
  const fd = DATA[domain].funnel_dropoff;
  const stepLabels = ['Email 1','Email 2','Email 3','Email 4'];
  const stepColors = ['#2563eb','#7c3aed','#0d9488','#ea580c'];

  let html = `<div class="card"><div class="card-title">Volume Drop-off per Step (Delivered)</div>`;

  [2025,2026].forEach(yr=>{
    const d = fd[String(yr)];
    const vals = stepLabels.map(s=>d[s]||0);
    const maxV = Math.max(...vals.filter(v=>v>0));
    html += `<div style="margin-bottom:20px"><div style="font-size:12px;font-weight:700;color:#555;margin-bottom:10px">${yr}${yr===2026?' (Jan–Mar)':''}</div>`;
    stepLabels.forEach((sl,i)=>{
      const v = d[sl]||0;
      if(v===0 && yr===2025) return; // Email 3/4 don't exist in 2025
      const w = maxV>0?(v/maxV*100).toFixed(0):0;
      const prev_v = i>0?(d[stepLabels[i-1]]||0):0;
      const drop = prev_v>0?((v-prev_v)/prev_v*100).toFixed(0):null;
      const isN = isNew(sl);
      html+=`<div class="funnel-row">
        <div class="funnel-lbl">${sl}${isN&&yr===2026?' <span class="new-badge">new</span>':''}</div>
        <div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${w}%;background:${stepColors[i]}">${v.toLocaleString()}</div></div>
        <div class="funnel-arrow">${drop!==null?drop+'%':''}</div>
      </div>`;
    });
    html += '</div>';
  });
  html += '</div>';

  // Charts
  html += `<div class="g2">
    <div class="chart-wrap"><h4>Delivered per Step</h4><canvas id="fchart1"></canvas></div>
    <div class="chart-wrap"><h4>CBH per Step</h4><canvas id="fchart2"></canvas></div>
  </div>`;

  $('panel-funnel').innerHTML = html;

  const agg = (st, yr, metric) => {
    const rows = DATA[domain].monthly.filter(r=>r.step===st&&r.year===yr);
    if(!rows.length) return 0;
    return metric==='Delivered'?rows.reduce((s,r)=>s+r.Delivered,0):rows.reduce((s,r)=>s+r.cbh,0);
  };

  ['fchart1','fchart2'].forEach(id=>destroyChart(id));
  charts['fchart1'] = new Chart($('fchart1'),{type:'bar',data:{
    labels:stepLabels,
    datasets:[
      {label:'2025',data:stepLabels.map(s=>agg(s,2025,'Delivered')),backgroundColor:'#d0cdc5',borderRadius:3},
      {label:'2026',data:stepLabels.map(s=>agg(s,2026,'Delivered')),backgroundColor:stepColors,borderRadius:3},
    ]
  },options:{responsive:true,plugins:{legend:{labels:{font:{family:'DM Sans'},boxWidth:10}}},
    scales:{x:{ticks:{font:{family:'DM Sans'}}},y:{ticks:{font:{family:'DM Mono',size:10},callback:v=>Math.round(v/1000)+'K'}}}}});

  charts['fchart2'] = new Chart($('fchart2'),{type:'bar',data:{
    labels:stepLabels,
    datasets:[
      {label:'2025',data:stepLabels.map(s=>+agg(s,2025,'cbh').toFixed(0)),backgroundColor:'#d0cdc5',borderRadius:3},
      {label:'2026',data:stepLabels.map(s=>+agg(s,2026,'cbh').toFixed(0)),backgroundColor:stepColors,borderRadius:3},
    ]
  },options:{responsive:true,plugins:{legend:{labels:{font:{family:'DM Sans'},boxWidth:10}}},
    scales:{x:{ticks:{font:{family:'DM Sans'}}},y:{ticks:{font:{family:'DM Mono',size:10},callback:v=>'$'+Math.round(v)}}}}});
}

// ── DISPATCH ───────────────────────────────────────────────────────────────
function renderSection(){
  if(section==='yoy') renderYoY();
  else if(section==='decomp') renderDecomp();
  else if(section==='funnel') renderFunnel();
}
function renderAll(){ renderKPI(); renderSection(); }

// ── EVENTS ─────────────────────────────────────────────────────────────────
$('brandTabs').addEventListener('click',e=>{
  const t=e.target.closest('.brand-tab'); if(!t) return;
  document.querySelectorAll('.brand-tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); domain=t.dataset.d; renderAll();
});
document.querySelectorAll('.step-pill').forEach(p=>{
  p.addEventListener('click',()=>{
    document.querySelectorAll('.step-pill').forEach(x=>x.classList.remove('active'));
    p.classList.add('active'); step=p.dataset.s; renderAll();
  });
});
$('sectionTabs').addEventListener('click',e=>{
  const t=e.target.closest('.section-tab'); if(!t) return;
  document.querySelectorAll('.section-tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); section=t.dataset.t;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  $('panel-'+section).classList.add('active');
  renderSection();
});

renderAll();
</script>

function renderReco(){
  const bneck = BOTTLENECKS[domain];
  const recos = RECOS[domain];

  let html = `<div class="bneck-box">⚠️ <strong>Key Issue:</strong> ${bneck}</div>`;
  html += '<div class="reco-grid">';
  recos.forEach(r => {
    html += `<div class="reco-card">
      <div class="meta">${r.meta}</div>
      <h5>${r.title}</h5>
      <p>${r.evidence}</p>
      <p class="action" style="margin-top:7px"><strong>Action:</strong> ${r.action}</p>
      <div class="impact">${r.impact}</div>
    </div>`;
  });
  html += '</div>';

  // Impact table
  const impacts = {
    'Bra Goddess': [
      ['Fix Email 2 Access Rate 3.1%→4.6%','~+$180/month','~+$1,440 May–Dec'],
      ['Email 3 AOV upgrade to $35+','CBH/1K doubles to ~$5.5','~+$2,300 on E3 lifetime'],
      ['Scale Email 1 (working)','$107/10K delivered','Compounding monthly'],
    ],
    'GentsLux': [
      ['Fix Email 2 Co Rate ≥75%','~+$120/month on E2','~+$960 May–Dec'],
      ['Scale Email 3 & 4 (outperforming E2)','E3+E4 CBH/1K = $5.6–5.7','Scale with confidence'],
      ['Fix Email 1 Co Rate ≥78%','Protects +$20/month','Prevents future erosion'],
    ],
    'LuxFitting': [
      ['Fix Email 2 Init Co Rate ≥7%','~+$100/month on E2','~+$800 May–Dec'],
      ['Email 3 product upgrade Init Co ≥8%','CBH/1K $3.62 → ~$12','~+$1,400 on E3'],
      ['Scale Email 1 (strongest in flow)','$96/5K delivered','Compounding monthly'],
    ],
    'SantaFare': [
      ['Pause Email 4 immediately','Stop -$68 monthly loss','Save list health'],
      ['Fix Email 2 (all factors degrading)','~+$90/month partial recovery','Urgent'],
      ['Fix Email 3 Init Co Rate ≥5%','CBH/1K $0.19 → $0.65','Do not scale before fixing'],
    ],
  };

  html += `<div class="card"><div class="card-title">Quantified Impact Summary</div>
    <table class="impact-tbl"><thead><tr><th>Action</th><th>Monthly Impact</th><th>May–Dec 2026</th></tr></thead><tbody>`;
  (impacts[domain]||[]).forEach(r=>{
    html+=`<tr><td>${r[0]}</td><td style="color:#16a34a;font-weight:700">${r[1]}</td><td style="color:#16a34a;font-weight:700">${r[2]}</td></tr>`;
  });
  html += '</tbody></table></div>';

  $('panel-reco').innerHTML = html;
}

// Patch into the existing renderSection and section tab handler
const _origRenderSection = renderSection;
window.renderSection = function(){
  _origRenderSection();
  if(section==='reco') renderReco();
};

document.getElementById('sectionTabs').addEventListener('click', e => {
  const t = e.target.closest('.section-tab[data-t="reco"]');
  if(!t) return;
  document.querySelectorAll('.section-tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  section = 'reco';
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-reco').classList.add('active');
  renderReco();
}, true);
</script>
