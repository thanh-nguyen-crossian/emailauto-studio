.chart-wrap canvas{max-height:200px}

thead tr{background:#f4f3ef}
th{padding:8px 9px;text-align:right;font-weight:600;color:#666;font-size:11.5px;white-space:nowrap}
th:first-child{text-align:left}
td{padding:7px 9px;text-align:right;border-bottom:1px solid #f0ede8;font-family:'DM Mono',monospace}
td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-weight:500}
tr:last-child td{border-bottom:none}
tr.y26{background:#eff6ff}
tr.partial{background:#fffbeb}
tr:hover{background:#f9f8f6}

.verd-imp{color:#16a34a;font-weight:700}
.verd-deg{color:#dc2626;font-weight:700}
.verd-flat{color:#888}

// ── state ──────────────────────────────────────────────────────────────────
let domain = 'Bra Goddess', section = 'yoy';
const charts = {};
const ML = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── helpers ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmtN = (v,t) => {
  if(v===null||v===undefined||isNaN(v)) return '—';
  switch(t){
    case '$': return '$'+Math.round(v).toLocaleString();
    case 'num': return Math.round(v).toLocaleString();
    case 'pct': return (v*100).toFixed(1)+'%';
    case 'pct2': return (v*100).toFixed(2)+'%';
    case 'pct3': return (v*100).toFixed(3)+'%';
    case 'aov': return '$'+(+v).toFixed(2);
    case 'dec': return (+v).toFixed(2);
    case 'dec1': return (+v).toFixed(1);
    default: return v;
  }
};
const delta = (v,t='pct') => {
  if(v===null||v===undefined) return '';
  const cl = v>0?'up':v<0?'dn':'fl';
  const sign = v>0?'+':'';
  return `<span class="kpi-delta ${cl}">${sign}${v.toFixed(1)}%</span>`;
};
const arrow = (a,b) => {
  if(a===null||b===null) return '';
  const d=(a-b)/Math.abs(b||1);
  if(d>0.05) return '<span style="color:#16a34a">↑</span>';
  if(d<-0.05) return '<span style="color:#dc2626">↓</span>';
  return '<span style="color:#aaa">→</span>';
};
const pBadge = v => {
  if(v===null||v===undefined) return '—';
  const cl = v>0?'#dcfce7':'#fee2e2'; const tc = v>0?'#15803d':'#b91c1c';
  return `<span style="background:${cl};color:${tc};font-weight:700;font-size:11px;padding:1px 6px;border-radius:4px">${v>0?'+':''}${v.toFixed(1)}%</span>`;
};
const vClass = v => v==='Improving'?'verd-imp':v==='Degrading'?'verd-deg':'verd-flat';
const vFmt = (v,f) => {
  if(v===null||v===undefined) return '—';
  if(f==='pct') return (v*100).toFixed(1)+'%';
  if(f==='pct2') return (v*100).toFixed(2)+'%';
  if(f==='aov') return '$'+v.toFixed(2);
  return v.toFixed(2);
};
const monthLabel = m => { const [y,mo]=m.split('-'); return ML[+mo-1]+" '"+y.slice(2); };
const destroyChart = id => { if(charts[id]){charts[id].destroy();delete charts[id];} };
const isPartial = m => m==='2026-05';

function makeChart(id, cfg){
  destroyChart(id);
  const ctx = document.getElementById(id);
  if(!ctx) return;
  charts[id] = new Chart(ctx, cfg);
}

function renderKPI(){
  const k = DATA[domain].kpi;
  const items = [
    {l:'CBH Jan–Apr 2026', v:'$'+Math.round(k.cbh_26).toLocaleString(), d:k.cbh_pct},
    {l:'Delivered Jan–Apr 2026', v:Math.round(k.delivered_26).toLocaleString(), d:k.delivered_pct},
    {l:'Avg Open Rate 2026', v:k.open_rate_26+'%', d:k.open_rate_pct},
    {l:'Avg Access Rate 2026', v:k.access_rate_26+'%', d:k.access_rate_pct},
    {l:'Sends Jan–Apr', v:`${k.sends_26} <span style="font-size:12px;color:#888">vs ${k.sends_25}</span>`, d:null, raw:true},
  ];
  $('kpiStrip').innerHTML = items.map(i=>`<div class="kpi-card">
    <div class="kpi-lbl">${i.l}</div>
    <div class="kpi-val">${i.v}</div>
    ${i.d!==null&&i.d!==undefined?delta(i.d):''}
  </div>`).join('');
}

// ── CONTENT & SEGMENT ──────────────────────────────────────────────────────
function renderContent(){
  const ct = DATA[domain].content_types;
  const segs = DATA[domain].segments;
  const maxCbh = Math.max(...ct.map(c=>c.avg_cbh_1k||0));

  $('panel-content').innerHTML = `
    <div class="g2">
      <div class="chart-wrap" style="grid-column:1/-1"><h4>Avg CBH/1K by Content Type</h4><canvas id="cCt" style="max-height:180px"></canvas></div>
    </div>
    <div class="card"><div class="card-title">Content Type Performance</div><div id="ctTbl"></div></div>
    <div class="card"><div class="card-title">Segment Performance</div><div id="segTbl"></div></div>
  `;

  makeChart('cCt',{type:'bar',data:{
    labels:ct.map(c=>c.type),
    datasets:[{label:'Avg CBH/1K',data:ct.map(c=>c.avg_cbh_1k),backgroundColor:'#2563eb',borderRadius:3}]
  },options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},
    scales:{x:{ticks:{font:{family:'DM Mono',size:10}}},y:{ticks:{font:{family:'DM Sans',size:11}}}}}});

  let th = `<table><thead><tr><th>Content Type</th><th>Sends</th><th>Avg CBH/1K</th><th>Rank</th><th>Avg Open Rate</th><th>Avg Access Rate</th><th>Avg Checkout</th><th>Avg Conv</th><th>Avg AOV</th></tr></thead><tbody>`;
  ct.forEach((c,i)=>{
    const w = maxCbh>0?(c.avg_cbh_1k||0)/maxCbh*80:0;
    th+=`<tr><td>${c.type}</td><td>${c.n_sends}</td>
      <td><span class="bar-inline" style="width:${w.toFixed(0)}px"></span>${(c.avg_cbh_1k||0).toFixed(2)}</td>
      <td style="text-align:center">#${i+1}</td>
      <td>${fmtN(c.avg_open_rate,'pct')}</td>
      <td>${fmtN(c.avg_access_rate,'pct2')}</td>
      <td>${fmtN(c.avg_checkout_rate,'pct')}</td>
      <td>${fmtN(c.avg_conv_rate,'pct')}</td>
      <td>${fmtN(c.avg_aov,'aov')}</td>
    </tr>`;
  });
  th+='</tbody></table>';
  $('ctTbl').innerHTML = th;

  const validSegs = segs.filter(s=>s.segment && s.segment.length>2);
  let sh = `<table><thead><tr><th>Segment</th><th>Sends</th><th>Avg CBH/Send</th><th>Avg CBH/1K</th><th>Avg Open Rate</th><th>Avg Access Rate</th></tr></thead><tbody>`;
  validSegs.forEach(s=>{
    const isF = s.segment.includes(',F');
    sh+=`<tr><td><span class="seg-badge" style="${isF?'background:#f0fdf4;color:#15803d':''}">${s.segment}</span></td>
      <td>${s.n_sends}</td><td>${fmtN(s.avg_cbh,'$')}</td><td>${(s.avg_cbh_1k||0).toFixed(2)}</td>
      <td>${fmtN(s.avg_open_rate,'pct')}</td><td>${fmtN(s.avg_access_rate,'pct2')}</td></tr>`;
  });
  sh+='</tbody></table>';
  $('segTbl').innerHTML = sh;
}

// ── DISPATCH ───────────────────────────────────────────────────────────────
function renderSection(){
  if(section==='yoy') renderYoY();
  else if(section==='decomp') renderDecomp();
  else if(section==='sends') renderSends();
  else if(section==='content') renderContent();
  else if(section==='solutions') renderSolutions();
}

function renderAll(){
  renderKPI();
  renderSection();
}

// ── EVENTS ─────────────────────────────────────────────────────────────────
$('brandTabs').addEventListener('click',e=>{
  const t=e.target.closest('.brand-tab'); if(!t) return;
  document.querySelectorAll('.brand-tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  domain=t.dataset.d;
  renderAll();
});

$('sectionTabs').addEventListener('click',e=>{
  const t=e.target.closest('.section-tab'); if(!t) return;
  document.querySelectorAll('.section-tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  section=t.dataset.s;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  $('panel-'+section).classList.add('active');
  renderSection();
});

renderAll();
