<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Brief Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script defer src="./email-brief-generator.local.js"></script>
<style>
:root {
  --bg:#f4f7f8;--surface:#ffffff;--surface-2:#f8faf9;--ink:#17212c;
  --text:#222936;--text-sec:#667282;--border:#dbe5e3;
  --accent:#23665a;--accent-2:#d66f3f;--accent-light:#e8f4f1;
  --success:#17845f;--warn:#b7791f;--error:#c24137;
  --header:#111820;--header-2:#1d2730;
  --font-body:'Plus Jakarta Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --radius:10px;--radius-sm:7px;
  --shadow-sm:0 1px 2px rgba(24,33,47,.06),0 10px 24px rgba(24,33,47,.04);
  --shadow-md:0 18px 42px rgba(24,33,47,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:3px solid rgba(194,106,58,.28);outline-offset:2px}

/* ── Header ── */
.app-header{background:var(--header);color:#fff;padding:13px 24px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 10px 32px rgba(16,24,32,.24)}
.brand-lockup{display:flex;align-items:center;gap:11px;flex:1;min-width:230px}
.brand-mark{width:34px;height:34px;border-radius:8px;background:#f3c677;color:#101820;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;letter-spacing:.04em}
.app-title h1{font-size:15px;font-weight:800;line-height:1.2}
.app-title p{font-size:11px;color:#b8c1ca;margin-top:1px}
.hdr-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hdr-group{display:flex;align-items:center;gap:6px}
.hdr-group label{font-size:11px;color:#b8c1ca;white-space:nowrap}
.hdr-select{background:var(--header-2);color:#fff;border:1px solid #33414d;border-radius:7px;padding:6px 9px;font-family:var(--font-body);font-size:12px;cursor:pointer;transition:all .15s}
.hdr-select:hover{border-color:#f3c677}
.hdr-select:focus{outline:none;border-color:#f3c677;box-shadow:0 0 0 3px rgba(243,198,119,.18)}
.hdr-input{background:var(--header-2);color:#fff;border:1px solid #33414d;border-radius:7px;padding:6px 10px;font-family:var(--font-mono);font-size:11px;width:210px;transition:all .15s}
.hdr-input::placeholder{color:#7f8b95}
.hdr-input:focus{outline:none;border-color:#f3c677;box-shadow:0 0 0 3px rgba(243,198,119,.18)}
.btn-hdr{background:#263440;color:#dbe2e8;border:1px solid #364552;border-radius:7px;padding:6px 10px;font-size:11px;cursor:pointer;font-family:var(--font-body);transition:all .15s;white-space:nowrap}
.btn-hdr:hover{background:#314250;color:#fff;border-color:#52616d}
.btn-hdr.danger:hover{background:#3b2423;border-color:#87413b;color:#fff}
.key-status{font-size:11px;color:#f3c677;background:rgba(243,198,119,.12);border:1px solid rgba(243,198,119,.32);border-radius:999px;padding:4px 8px;white-space:nowrap}
.key-status.empty{color:#b8c1ca;background:rgba(255,255,255,.06);border-color:#34424f}
.lang-toggle{display:flex;background:var(--header-2);border-radius:7px;overflow:hidden;border:1px solid #33414d}
.lang-toggle button{background:none;border:none;color:#b8c1ca;padding:6px 10px;font-size:11px;font-family:var(--font-body);cursor:pointer;transition:all .15s}
.lang-toggle button.active{background:#f3c677;color:#101820;font-weight:800}
.lang-toggle button:not(.active):hover{color:#fff}
.local-note{max-width:1200px;margin:14px auto 0;padding:10px 16px;border:1px solid #d7e3e0;background:rgba(255,255,255,.78);border-radius:10px;color:#5b6471;font-size:12px;display:flex;justify-content:space-between;gap:12px;align-items:center}
.local-note strong{color:var(--ink)}
.proxy-pill{font-family:var(--font-mono);font-size:11px;background:#edf6f1;color:#315c51;border:1px solid #cfe4da;border-radius:999px;padding:3px 8px;white-space:nowrap}

/* ── Layout ── */
.app-main{max-width:1200px;margin:0 auto;padding:18px 16px 28px;display:flex;flex-direction:column;gap:14px}

/* ── Wizard cards ── */
.w-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow .2s,border-color .2s}
.w-card.active{box-shadow:var(--shadow-md);border-color:var(--accent)}
.w-card-hdr{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .15s}
.w-card-hdr:hover{background:#f6faf8}
.step-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .2s}
.step-badge.pending{background:var(--bg);color:var(--text-sec);border:2px solid var(--border)}
.step-badge.active{background:var(--accent);color:#fff;box-shadow:0 0 0 3px rgba(49,92,81,.18)}
.step-badge.done{background:var(--success);color:#fff}
.w-card-title{font-weight:600;font-size:13px;flex:1}
.w-card-summary{font-size:11px;color:var(--text-sec);max-width:500px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-edit{font-size:11px;color:var(--accent);background:var(--accent-light);border:none;border-radius:4px;padding:3px 8px;cursor:pointer;font-family:var(--font-body);white-space:nowrap;transition:all .15s}
.btn-edit:hover{background:#d8ebe3}
.w-card-body{padding:18px;border-top:1px solid var(--border)}
.w-card-body.hidden{display:none}

/* ── Form elements ── */
.fg{margin-bottom:14px}
.fg label,.fg-label{display:block;font-size:11px;font-weight:700;color:var(--text-sec);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;font-family:var(--font-body);font-size:13px;color:var(--text);background:var(--surface);transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(49,92,81,.10)}
.fg textarea{resize:vertical;min-height:70px}
.input-hint{font-size:11px;color:var(--text-sec);margin-top:4px}

/* ── Radio pills ── */
.pills{display:flex;flex-wrap:wrap;gap:7px}
.pill{position:relative}
.pill input{position:absolute;opacity:0;width:1px;height:1px;pointer-events:none}
.pill label{display:inline-flex;align-items:center;padding:6px 13px;border:2px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s}
.pill input:checked+label{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.pill label:hover{border-color:#9bc2b3;background:#f2faf6}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-sm);border:none;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#254b42;transform:translateY(-1px);box-shadow:0 4px 12px rgba(49,92,81,.24)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{background:#9bc2b3;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--surface-2);border-color:#d3c5b2}
.btn-skip{background:none;color:var(--text-sec);border:none;font-size:12px;cursor:pointer;text-decoration:underline;font-family:var(--font-body);padding:0;transition:color .15s}
.btn-skip:hover{color:var(--text)}
.btn-row{display:flex;align-items:center;gap:10px;margin-top:16px;flex-wrap:wrap}

/* ── Alerts ── */
.alert{border-radius:var(--radius-sm);padding:9px 13px;font-size:12px;margin-bottom:12px;display:flex;gap:8px}
.alert.hidden{display:none}
.alert-warn{background:#fffbeb;border:1px solid var(--warn);color:#92400e}
.alert-info{background:#edf6f1;border:1px solid #b9d8cc;color:#315c51}

/* ── Product grid ── */
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.p-slot{border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px;transition:border-color .15s}
.p-slot:hover{border-color:#9bc2b3}
.p-slot.hero{border-color:var(--warn);background:#fffbeb}
.p-slot-lbl{font-size:10px;font-weight:700;color:var(--text-sec);text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.p-slot select{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 9px;font-size:12px;font-family:var(--font-body);margin-bottom:5px;transition:border-color .15s}
.p-slot select:focus{outline:none;border-color:var(--accent)}
.btn-custom-url{font-size:11px;color:var(--accent);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:var(--font-body);padding:0;transition:color .15s}
.btn-custom-url:hover{color:#254b42}
.custom-url-wrap{margin-top:6px;display:none}
.custom-url-wrap.open{display:block}
.custom-url-wrap input{width:100%;border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:11px;font-family:var(--font-mono)}
.usp-wrap{margin-top:6px}
.usp-input{width:100%;border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:11px;font-family:var(--font-body);margin-bottom:3px;transition:border-color .15s}
.usp-input:focus{outline:none;border-color:var(--accent)}
.scrape-status{font-size:10px;color:var(--text-sec);margin-top:3px}

/* ── Segments ── */
.seg-list{display:flex;flex-direction:column;gap:7px}
.seg-item{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);transition:border-color .15s}
.seg-item:hover{border-color:#9bc2b3}
.seg-item input[type=checkbox]{margin-top:2px;accent-color:var(--accent);width:15px;height:15px;flex-shrink:0}
.seg-name{font-size:12px;font-weight:600}
.seg-meta{font-size:10px;color:var(--text-sec);margin-top:1px}
.tier-list{display:flex;flex-direction:column;gap:5px;margin-top:7px;padding-left:14px}
.tier-item{display:flex;align-items:center;gap:7px;font-size:12px;cursor:pointer}
.seg-check-static{accent-color:var(--accent);width:15px;height:15px;background:var(--surface)}
.muted-tiny{color:var(--text-sec);font-size:10px;background:var(--surface)}

/* ── Pre-flight ── */
.preflight{background:#f7fbf8;border:1px solid #b9d8cc;border-radius:var(--radius-sm);padding:14px;margin-bottom:14px;font-family:var(--font-mono);font-size:11px;line-height:2}
.preflight .lbl{color:var(--text-sec);display:inline-block;width:100px}
.preflight .val{color:var(--text);font-weight:500}
.token-warn{color:#92400e;font-size:11px;margin-bottom:10px;padding:7px 11px;background:#fffbeb;border-radius:var(--radius-sm);border:1px solid var(--warn)}
.token-warn.hidden{display:none}

/* ── Progress ── */
.progress-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm)}
.progress-title{font-size:13px;font-weight:600;margin-bottom:10px}
.prog-steps{display:grid;grid-template-columns:1fr 1fr;gap:6px}
@media(max-width:600px){.prog-steps{grid-template-columns:1fr}}
.prog-step{display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 0}
.prog-step .ico{width:9px;height:9px;border-radius:999px;background:#c7ced6;display:inline-block;flex-shrink:0}
.prog-step.done .ico{background:var(--success)}
.prog-step.running .ico{background:var(--accent-2);box-shadow:0 0 0 4px rgba(194,106,58,.14)}
.prog-step.waiting .ico{background:#c7ced6}

/* ── Output panel ── */
#output-panel{display:none}
#output-panel.open{display:block}
.output-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.output-toolbar h2{font-size:16px;font-weight:700}
.output-actions{display:flex;gap:8px;flex-wrap:wrap}
.output-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:1100px){.output-cols{grid-template-columns:1fr}}
.opt-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
.opt-card-hdr{background:linear-gradient(135deg,#315c51,#c26a3a);color:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
.opt-card-hdr h3{font-size:14px;font-weight:700}
.btn-copy-full{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:var(--font-body);transition:all .15s}
.btn-copy-full:hover{background:rgba(255,255,255,.25)}
.out-section{padding:14px 18px;border-bottom:1px solid var(--border)}
.out-section:last-child{border-bottom:none}
.out-sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.out-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-sec)}
.btn-copy-sec{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:10px;cursor:pointer;font-family:var(--font-body);transition:all .15s}
.btn-copy-sec:hover{background:var(--accent-light);color:var(--accent);border-color:#9bc2b3}
.out-content{font-size:12px;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.out-label{font-size:10px;font-weight:700;color:var(--text-sec);text-transform:uppercase;background:var(--surface)}
.out-muted{color:var(--text-sec);background:var(--surface)}
.out-muted.small{font-size:11px}
.banner-cta-text{color:var(--accent);background:var(--surface)}
.flag-err{color:var(--error);font-weight:700}
.flag-warn{color:var(--warn);font-weight:700}
.direction-box{background:#f7fbf8;border:1px solid #b9d8cc;border-radius:var(--radius-sm);padding:10px 13px;font-size:12px;line-height:1.8;margin-bottom:6px}
.direction-box strong{color:var(--accent)}
.quality-strip{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.quality-score{min-width:58px;height:58px;border-radius:12px;background:var(--accent);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;line-height:1.1}
.quality-score span{font-size:10px;font-weight:600;opacity:.82}
.quality-meta{font-size:11px;color:var(--text-sec);line-height:1.6}
.qc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.qc-item{background:var(--surface-2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:11px;line-height:1.55}
.qc-item strong{display:block;color:var(--ink);font-size:10px;text-transform:uppercase;margin-bottom:2px}
.perf-panel{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--accent-2);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow-sm);margin-bottom:14px}
.perf-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.perf-head .perf-title{font-size:14px;font-weight:800;color:var(--ink);line-height:1.25}
.perf-head p{font-size:12px;color:var(--text-sec);margin-top:2px}
.perf-kicker{font-family:var(--font-mono);font-size:10px;color:var(--accent);background:var(--accent-light);border:1px solid #cfe4da;border-radius:999px;padding:3px 8px;white-space:nowrap}
.perf-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.perf-card{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;min-height:86px}
.perf-card b{display:block;font-size:10px;text-transform:uppercase;color:var(--text-sec);margin-bottom:4px}
.perf-card strong{display:block;font-size:13px;color:var(--ink);line-height:1.35;margin-bottom:3px}
.perf-card span{display:block;font-size:11px;color:var(--text-sec);line-height:1.45}
.perf-list{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.perf-note{border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:11px;line-height:1.55;background:#fff}
.perf-note b{display:block;color:var(--ink);font-size:10px;text-transform:uppercase;margin-bottom:2px}
.perf-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.perf-tag{font-size:11px;color:var(--accent);background:var(--accent-light);border:1px solid #cfe4da;border-radius:999px;padding:3px 8px}

/* ── Product blocks (output) ── */
.prod-grid-out{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.prod-block{border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px;font-size:12px}
.prod-block .prod-name{font-weight:700;margin-bottom:6px;font-size:13px}
.prod-block .prod-main{font-weight:600;text-transform:uppercase;font-size:11px;color:var(--accent);margin-bottom:3px}
.prod-block .prod-sub{color:var(--text-sec);margin-bottom:4px}
.prod-block .prod-badge{display:inline-block;background:#fef9c3;border:1px solid #fde047;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:600;margin-bottom:4px}
.prod-block .prod-usp{display:flex;gap:5px;margin-bottom:2px}
.prod-block .prod-usp::before{content:'+';font-size:10px;color:var(--success);font-weight:800}
.prod-block .prod-review{font-style:italic;color:var(--text-sec);font-size:11px;border-left:2px solid var(--border);padding-left:7px;margin:5px 0}
.prod-block .prod-cta{background:var(--accent);color:#fff;border:none;border-radius:5px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-body);margin-top:5px;width:100%;transition:background .15s}
.prod-block .prod-cta:hover{background:#254b42}

/* ── Refine panel ── */
.refine-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm)}
.refine-panel h3{font-size:13px;font-weight:600;margin-bottom:12px}
.refine-scope{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.refine-scope label{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer}
.refine-actions{display:flex;align-items:center;gap:10px;margin-top:10px}
.btn-undo{background:none;border:none;color:var(--text-sec);font-size:12px;cursor:pointer;text-decoration:underline;font-family:var(--font-body);display:none;transition:color .15s}
.btn-undo:hover{color:var(--text)}
.btn-undo.visible{display:inline-block}

/* ── Accessibility ── */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.skip-link{position:absolute;left:12px;top:-48px;background:#fff;color:var(--accent);border:2px solid var(--accent);border-radius:7px;padding:8px 12px;z-index:200;font-weight:800;text-decoration:none}
.skip-link:focus{top:12px}
.fieldset-reset{border:0;padding:0;margin:0}
.fieldset-reset legend{margin-bottom:5px}

/* ── USP pool ── */
.usp-pool{margin-top:6px;display:flex;flex-direction:column;gap:3px}
.usp-check{display:flex;align-items:flex-start;gap:6px;font-size:11px;cursor:pointer;padding:3px 0;line-height:1.4}
.usp-check input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;flex-shrink:0;margin-top:1px}
.usp-check span{color:var(--text)}
.usp-custom-area{margin-top:5px}
.btn-add-usp{font-size:11px;color:var(--accent);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:var(--font-body);padding:2px 0;margin-top:4px;display:block;transition:color .15s}
.btn-add-usp:hover{color:#254b42}

/* ── Offer preview ── */
.offer-preview{margin-top:8px;padding:7px 11px;background:#edf6f1;border:1px solid #b9d8cc;border-radius:var(--radius-sm);font-size:12px;color:#315c51}
.offer-preview strong{font-weight:700}

/* ── Per-option model selectors ── */
.option-models-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;padding:12px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm)}
.option-model-block{display:flex;flex-direction:column;gap:6px}
.option-model-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-sec)}
.option-model-selects{display:flex;gap:6px;flex-wrap:wrap}
.option-model-selects select{border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-family:var(--font-body);font-size:12px;color:var(--text);background:var(--surface);cursor:pointer;transition:border-color .15s}
.option-model-selects select:focus{outline:none;border-color:var(--accent)}
.model-tag{font-size:10px;font-family:var(--font-mono);color:var(--text-sec);background:var(--surface-2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;margin-left:6px;vertical-align:middle}

/* ── Performance context editor ── */
.perf-edit-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:14px;overflow:hidden}
.perf-edit-wrap summary{padding:9px 14px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-sec);list-style:none;display:flex;align-items:center;justify-content:space-between;user-select:none;transition:background .15s}
.perf-edit-wrap summary:hover{background:var(--surface-2);color:var(--text)}
.perf-edit-wrap[open] summary{border-bottom:1px solid var(--border);color:var(--text)}
.perf-edit-body{padding:12px 14px}
.perf-context-ta{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;font-family:var(--font-mono);font-size:11px;color:var(--text);background:#fcfcfc;line-height:1.6;min-height:180px;resize:vertical;transition:border-color .15s}
.perf-context-ta:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(49,92,81,.10)}
.perf-edit-actions{display:flex;align-items:center;gap:8px;margin-top:8px}
.custom-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#b7791f;background:#fffbeb;border:1px solid var(--warn);border-radius:4px;padding:1px 6px}

/* ── Responsive ── */
@media(max-width:1100px){
  .output-cols{grid-template-columns:1fr}
  .prod-grid-out{grid-template-columns:1fr 1fr}
  .option-models-row{grid-template-columns:1fr}
}

const PLAYBOOK_RULES = `
EMAIL COPY RULES (must follow — from the Email Campaign Playbook):
SUBJECT LINE:
- Length: 42-58 chars target, hard cap 60. Never all-caps.
- Formula: PROMISE + CONTEXT + CLICK REASON — the reader must know WHY before opening.
- Use {{first_name}} personalisation exactly once across subject OR preheader, not both.
- No generic category names as subjects ("Summer bras", "New arrivals") with no click reason.

PREHEADER:
- Length: 60–90 chars. Adds context, proof, or curiosity the subject line cannot carry.
- Never repeats the subject wording.

SPAM & COMPLIANCE:
- Never: free!, winner, congratulations, click here, limited time offer, act now, urgent.
- Replace $ with 💲 or write as "12.99" without symbol.
- Replace "off" with "o.f.f" in promotional price lines.

BANNER:
- Main text: ALL-CAPS, ≤8 words per line, max two lines.
- Hero product must be visible and prominent in the banner image.
- Visual: one hero product center-frame with the brand palette. No busy multi-model collage.

BODY COPY:
- Open with: named micro-story (2-3 sentences) OR direct problem the customer recognises.
- Follow the pain-to-relief arc: pain/tension → product mechanism → supplied proof → offer/urgency → CTA.
- Never open with bullets, checkmarks, or generic gratitude.
- Add a natural product link (product name as anchor) by paragraph 2.
- Persona-signed. Mature-audience voice: comfort, ease, movement, confidence.
- P.S. adds new information (social proof, scarcity, curiosity) — never restates the offer.

PRODUCT BLOCKS:
- Main text: ALL CAPS, ≤5 words.
- Sub text: must include visible price or offer figure when a promo is supplied.
- USPs: start with a verb or adjective. No filler ("Great quality", "Amazing value", "Premium product").
- At least 2 USPs per product block.
- Product count: 4-6 for BraGoddess/GentsLux/LuxFitting; 4 for SantaFare. Never 7+.

CTAs:
- 2-4 words. Imperative verb + product name or benefit.
- Never: "Click here", "Learn more", "Shop now", "Discover more", "See more".

F-PATTERN RULE:
- Complete hook (pain + product promise + offer or proof) within first 200px / 3 lines.

ONE-PROMISE RULE:
- Every section (subject, banner, body, products, CTA) proves the same single claim.
- Maximum 2 hooks per email. Hook stacking (3+ unrelated angles) is a documented fail pattern.

BRAND COLOR GOVERNANCE:
- BraGoddess: pastel pink or deep crimson; one smiling mature woman model.
- GentsLux: deep navy, strong contrast, product depth/shadow.
- LuxFitting: hot pink or rose tones; elegant movement or silhouette model.
- SantaFare: deep red with warm gold accent; personalised product or gift occasion image.
`;

function updateModelOptions() {
  const sel = document.getElementById('model-select');
  const previous = state.model;
  sel.innerHTML = MODEL_OPTIONS[state.provider]
    .map(m => `<option value="${m}">${m}</option>`).join('');
  state.model = MODEL_OPTIONS[state.provider].includes(previous) ? previous : MODEL_OPTIONS[state.provider][0];
  sel.value = state.model;
  refreshApiKeyPlaceholder();
}

function saveApiKey() {
  const raw = document.getElementById('api-key-input').value.trim();
  if (!raw) return;
  sessionStorage.setItem(keyStorageId(state.provider), raw);
  document.getElementById('api-key-input').value = '';
  refreshApiKeyPlaceholder();
}

function clearApiKey(provider = state.provider) {
  sessionStorage.removeItem(keyStorageId(provider));
  const inp = document.getElementById('api-key-input');
  if (inp) inp.value = '';
  refreshApiKeyPlaceholder();
}

function refreshApiKeyPlaceholder() {
  const inp = document.getElementById('api-key-input');
  if (!inp) return;
  const source = getKeySource(state.provider);
  inp.placeholder = source === 'session'
    ? 'Saved for this session'
    : source === 'local'
      ? 'Loaded from local config'
      : 'Session API key';
  inp.value = '';
  refreshKeyStatus();
  refreshProxyStatus();
}

function keyStorageId(provider) {
  return `apikey_${provider}`;
}

function getLocalKeys() {
  return window.BRIEF_GENERATOR_KEYS || window.EMAIL_BRIEF_GENERATOR_KEYS || {};
}

function getApiKey(provider = state.provider) {
  return sessionStorage.getItem(keyStorageId(provider))
    || document.getElementById('api-key-input')?.value?.trim()
    || getLocalKeys()[provider]
    || '';
}

function getKeySource(provider = state.provider) {
  if (sessionStorage.getItem(keyStorageId(provider))) return 'session';
  if (getLocalKeys()[provider]) return 'local';
  return '';
}

function refreshKeyStatus() {
  const el = document.getElementById('key-status');
  if (!el) return;
  const source = getKeySource(state.provider);
  const label = PROVIDER_LABELS[state.provider] || state.provider;
  el.classList.toggle('empty', !source);
  el.textContent = source
    ? `${label} key: ${source === 'local' ? 'local config' : 'session'}`
    : `${label} key: missing`;
}

function getProxyUrl() {
  return (window.BRIEF_GENERATOR_PROXY_URL || safeGetStorage(PROXY_STORAGE_KEY) || '').trim().replace(/\/$/, '');
}

function redactSecrets(message) {
  let safe = String(message || '');
  ['claude','gemini','openai'].forEach(provider => {
    const key = getApiKey(provider);
    if (key) safe = safe.split(key).join('[redacted]');
  });
  return safe;
}

function refreshProxyStatus() {
  const el = document.getElementById('proxy-status');
  if (!el) return;
  const proxy = getProxyUrl();
  el.textContent = proxy ? 'Proxy mode enabled' : 'Direct provider mode';
}

const STEPS = [

];

function renderWizard() {
  const c = document.getElementById('wizard-container');
  c.innerHTML = STEPS.map(s => renderCard(s)).join('');
}

function renderCard({ n, title }) {
  const isDone = !!state.wizard.done[n];
  const isActive = state.wizard.step === n;
  const badgeClass = isDone ? 'done' : isActive ? 'active' : 'pending';
  const badgeText  = isDone ? '✓' : n;
  const summary    = isDone ? getSummary(n) : '';
  return `
<div class="w-card ${isActive ? 'active' : ''}" id="wcard-${n}">
  <div class="w-card-hdr" role="button" tabindex="0" aria-expanded="${isActive ? 'true' : 'false'}"
    aria-controls="wbody-${n}" onclick="toggleCard(${n})"
    onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleCard(${n})}">
    <span class="step-badge ${badgeClass}">${badgeText}</span>
    <span class="w-card-title">Step ${n}: ${title}</span>
    ${summary ? `<span class="w-card-summary">${escHtml(summary)}</span>` : ''}
    ${isDone ? `<button class="btn-edit" onclick="event.stopPropagation();editStep(${n})" onkeydown="event.stopPropagation()">Edit</button>` : ''}
  </div>
  <div class="w-card-body ${isActive ? '' : 'hidden'}" id="wbody-${n}">
    ${getStepBody(n)}
  </div>
</div>`;
}

function renderWizardStep(n) {
  const el = document.getElementById(`wbody-${n}`);
  if (el) el.innerHTML = getStepBody(n);
}

function toggleCard(n) {
  if (state.wizard.step === n) return;
  if (!state.wizard.done[n]) return;
  editStep(n);
}

function editStep(n) {
  state.wizard.step = n;
  renderWizard();
}

function advanceStep(n) {
  state.wizard.done[n] = true;
  state.wizard.step = n + 1;
  saveDraft();
  renderWizard();
  setTimeout(() => {
    const el = document.getElementById(`wcard-${n + 1}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 80);
}

function skipStep(n) {
  advanceStep(n);
}

function getSummary(n) {
  const w = state.wizard;
  if (n === 1) return `${w.brand || '—'} · ${w.date || '—'} · "${w.theme || '—'}"`;
  if (n === 2) { const full = getFullOfferValue(); return `${full || 'No promo'} · ${urgencyLabel(w.urgency)}`; }
  if (n === 3) {
    const filled = selectedProductNames();
    return filled.slice(0, 4).join(' · ') + (filled.length > 4 ? ` +${filled.length - 4}` : '');
  }
  if (n === 4) return `Segments: ${w.segments.join(' · ') || 'all'}`;
  if (n === 5) return w.lastHero ? `CTR ${w.lastCTR || '?'}% · ${w.lastAngle} · ${w.lastHero}` : 'Skipped';
  if (n === 6) return w.winningContent ? `Reference: ${w.winningContent.slice(0,60)}…` : 'Skipped';
  return '';
}

function urgencyLabel(u) {
  return { h24: '24 hrs (ends midnight)', h48: '48 hrs', weekend: 'Weekend only', none: 'No urgency' }[u] || u;
}

// Returns the combined offer string (discount + optional shipping bonus)
function getFullOfferValue() {
  const w = state.wizard;
  const parts = [w.offerValue, w.offerShipping].filter(Boolean);
  return parts.join(' + ');
}

// Call the API with a specific provider/model, then restore state
async function makeAPICallWith(systemPrompt, userPrompt, provider, model) {
  const prevProvider = state.provider;
  const prevModel = state.model;
  state.provider = provider;
  state.model = model;
  try {
    return await makeAPICall(systemPrompt, userPrompt);
  } finally {
    state.provider = prevProvider;
    state.model = prevModel;
  }
}

  const provider = state['provider' + opt];

  sel.innerHTML = opts.map(m => {
    const desc = MODEL_DESCRIPTIONS[m] || m;
    return `<option value="${m}">${desc}</option>`;
  }).join('');
  state['model' + opt] = opts[0] || '';
}

function buildUspPool(i) {
  const p = state.wizard.products[i];
  const match = findCatalogProduct(p.name);
  const poolItems = [...new Set([...(match.usps || []), ...(p.scrapedUsps || [])])].filter(Boolean);

  const poolHtml = poolItems.length ? `
<div class="usp-pool">
  ${poolItems.map(usp => {
    const id = 'usp-' + i + '-' + usp.replace(/[^a-z0-9]/gi,'').slice(0,12);
    const checked = p.usps.includes(usp) ? 'checked' : '';
    const safeUsp = escHtml(usp);
    const jsUsp = escHtml(JSON.stringify(usp));
    return `<label class="usp-check"><input type="checkbox" id="${id}" ${checked}
      onchange="toggleUsp(${i},${jsUsp},this.checked)"><span>${safeUsp}</span></label>`;
  }).join('')}
</div>` : '';

  const customUsps = p.usps.filter(u => !poolItems.includes(u));
  const customHtml = `
<div class="usp-custom-area" id="usp-custom-${i}">
  ${customUsps.map((u,j) => `<input class="usp-input" placeholder="Custom USP"
    value="${escHtml(u)}" oninput="updateCustomUsp(${i},${j},this.value)">`).join('')}
</div>
<button class="btn-add-usp" onclick="addCustomUsp(${i})">+ Add custom USP</button>`;

  return poolHtml + customHtml;
}

function toggleUsp(i, usp, checked) {
  const p = state.wizard.products[i];
  if (checked) {
    if (!p.usps.includes(usp)) p.usps.push(usp);
  } else {
    p.usps = p.usps.filter(u => u !== usp);
  }
}

function updateCustomUsp(i, j, val) {
  const p = state.wizard.products[i];
  const match = findCatalogProduct(p.name);
  const poolItems = [...new Set([...(match.usps || []), ...(p.scrapedUsps || [])])].filter(Boolean);
  const customUsps = p.usps.filter(u => !poolItems.includes(u));
  customUsps[j] = val;
  p.usps = [...p.usps.filter(u => poolItems.includes(u)), ...customUsps.filter(Boolean)];
}

function addCustomUsp(i) {
  const p = state.wizard.products[i];
  const match = findCatalogProduct(p.name);
  const poolItems = [...new Set([...(match.usps || []), ...(p.scrapedUsps || [])])].filter(Boolean);
  const customUsps = p.usps.filter(u => !poolItems.includes(u));
  customUsps.push('');
  p.usps = [...p.usps.filter(u => poolItems.includes(u)), ...customUsps];
  const area = document.getElementById(`usp-custom-${i}`);
  if (area) {
    const input = document.createElement('input');
    input.className = 'usp-input';
    input.placeholder = 'Custom USP';
    const j = customUsps.length - 1;
    input.oninput = () => updateCustomUsp(i, j, input.value);
    area.appendChild(input);
    input.focus();
  }
}

function toggleCustomUrl(i) {

async function scrapeProduct(i, url) {
  if (!url || !url.startsWith('http')) return;
  state.wizard.products[i].customUrl = url;
  const statusEl = document.getElementById(`scrape-status-${i}`);
  if (statusEl) statusEl.textContent = 'Fetching product page…';
  try {
    const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
    const res = await fetchWithTimeout(proxyUrl, {}, SCRAPE_TIMEOUT_MS);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (!json.contents) throw new Error('Empty response');
    const usps = extractUSPs(json.contents);
    if (usps.length) {
      state.wizard.products[i].scrapedUsps = usps.slice(0, 8);
      // Pre-select scraped USPs not already selected
      usps.slice(0, 4).forEach(u => {
        if (!state.wizard.products[i].usps.includes(u))
          state.wizard.products[i].usps.push(u);
      });
      state.wizard.products[i].scraped = true;
      const wrap = document.getElementById(`usps-${i}`);
      if (wrap) wrap.innerHTML = buildUspPool(i);
      if (statusEl) statusEl.textContent = `✓ Scraped ${usps.length} USPs — select below`;
    } else {
      if (statusEl) statusEl.textContent = 'No USPs extracted — enter manually below';
    }
  } catch (e) {
    if (statusEl) statusEl.textContent = 'Could not fetch page — enter USPs manually below';
  }
}

function extractUSPs(html) {
  const tmp = new DOMParser().parseFromString(String(html || ''), 'text/html');
  const items = [];
  tmp.querySelectorAll('li, .feature, .benefit, [class*="usp"], [class*="feature"]').forEach(el => {
    const t = el.textContent.trim();
    if (t.length > 5 && t.length < 120 && !t.includes('\n')) items.push(t);
  });
  return [...new Set(items)].slice(0, 6);
}

async function makeAPICall(systemPrompt, userPrompt) {
  const proxy = getProxyUrl();
  if (proxy) return callProxy(systemPrompt, userPrompt, proxy);

  const key = getApiKey();
  if (!key) throw new Error('No API key for ' + (PROVIDER_LABELS[state.provider] || state.provider) + '. Enter it in the header and click Save.');
  if (state.provider === 'claude')  return callClaude(systemPrompt, userPrompt, key);
  if (state.provider === 'gemini')  return callGemini(systemPrompt, userPrompt, key);
  if (state.provider === 'openai')  return callOpenAI(systemPrompt, userPrompt, key);
  throw new Error('Unknown provider: ' + state.provider);
}

async function fetchWithTimeout(url, options = {}, timeoutMs = API_TIMEOUT_MS) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    return await fetch(url, { ...options, signal: controller.signal });
  } finally {
    clearTimeout(timer);
  }
}

async function fetchJSON(url, options, label) {
  try {
    const res = await fetchWithTimeout(url, options, API_TIMEOUT_MS);
    const text = await res.text();
    let payload = {};
    try {
      payload = text ? JSON.parse(text) : {};
    } catch (parseError) {
      if (!res.ok) {
        throw new Error(label + ' ' + res.status + ': ' + (text || res.statusText || 'Non-JSON response').slice(0, 220));
      }
      throw parseError;
    }
    if (!res.ok) {
      const msg = payload.error?.message || payload.message || res.statusText || 'Request failed';
      throw new Error(label + ' ' + res.status + ': ' + msg);
    }
    return payload;
  } catch (e) {
    if (e.name === 'AbortError') throw new Error(label + ' timed out after ' + Math.round(API_TIMEOUT_MS / 1000) + ' seconds.');
    if (e instanceof SyntaxError) throw new Error(label + ' returned non-JSON response.');
    if (String(e.message || e).includes('Failed to fetch')) {
      throw new Error(label + ' request was blocked or unreachable. If direct browser calls fail, use the local proxy config.');
    }
    throw e;
  }
}

async function callProxy(sys, user, proxyUrl) {
  const data = await fetchJSON(proxyUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      provider: state.provider,
      model: state.model,
      system: sys,
      prompt: user,
      responseFormat: 'json_object'
    })
  }, 'Local proxy');
  return data.text || data.output || data.content || data.response;
}

async function callClaude(sys, user, key) {
  const data = await fetchJSON('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: state.model,
      max_tokens: GENERATION_MAX_TOKENS,
      temperature: 0.65,
      system: sys,
      messages: [{ role: 'user', content: user }]
    })
  }, 'Claude API');
  return data.content?.[0]?.text || '';
}

async function callGemini(sys, user, key) {
  const url = 'https://generativelanguage.googleapis.com/v1beta/models/' + encodeURIComponent(state.model) + ':generateContent';
  const data = await fetchJSON(url, {

      generationConfig: {
        temperature: 0.65,
        responseMimeType: 'application/json'
      }
    })
  }, 'Gemini API');
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';

async function callOpenAI(sys, user, key) {
  const data = await fetchJSON('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },

      ]
    })

function extractJSON(text) {
  text = typeof text === 'string' ? text : JSON.stringify(text || {});
  // Strip markdown code fences if present
  const fenced = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  const raw = fenced ? fenced[1] : text;
  const start = raw.indexOf('{');
  const end = raw.lastIndexOf('}');
  if (start === -1 || end === -1) throw new Error('No JSON object found in response');
  return JSON.parse(raw.slice(start, end + 1));
}

function normProductName(value) {
  return String(value || '').toLowerCase().replace(/[^a-z0-9]/g, '');
}

function productInList(productName, list) {
  const needle = normProductName(productName);
  return !!needle && (list || []).some(item => normProductName(item) === needle);

function normalizeText(value) {
  return String(value || '').toLowerCase().replace(/[^a-z0-9{}]+/g, ' ').replace(/\s+/g, ' ').trim();
}

function wordCount(value) {
  return String(value || '').trim().split(/\s+/).filter(Boolean).length;
}

function hasFirstNameToken(value) {
  return /{{\s*first_name\s*}}/i.test(String(value || ''));
}

function similarityScore(a, b) {
  const left = new Set(normalizeText(a).split(' ').filter(Boolean));
  const right = new Set(normalizeText(b).split(' ').filter(Boolean));
  if (!left.size || !right.size) return 0;
  const shared = [...left].filter(word => right.has(word)).length;
  return shared / Math.max(left.size, right.size);
}

async function generateBrief() {
  const btn = document.getElementById('gen-btn');
  if (btn) btn.disabled = true;

  showProgress();
  clearOutput();

  const pA = state.providerA || state.provider;
  const mA = state.modelA || state.model;
  const pB = state.providerB || state.provider;
  const mB = state.modelB || state.model;

  try {
    // Call Option A with its selected model
    updateProgressMsg(`Generating Option A (${mA})…`);
    const sysA = buildSystemPrompt(false, null);
    const usrA = buildUserPrompt(false);
    const rawA = await makeAPICallWith(sysA, usrA, pA, mA);
    const briefA = extractJSON(rawA);
    validateBrief(briefA);
    briefA._model = mA;
    briefA._provider = pA;
    markProgress('a', 'done', `Option A: done (${mA})`);

    // Call Option B with its selected model (contrast-enforced)
    updateProgressMsg(`Generating Option B (${mB}, contrasting direction)…`);
    markProgress('b', 'running', `Option B: calling ${mB}`);
    const sysB = buildSystemPrompt(true, briefA.creative_direction);
    const usrB = buildUserPrompt(true);
    let rawB = await makeAPICallWith(sysB, usrB, pB, mB);
    let briefB = extractJSON(rawB);
    validateBrief(briefB);
    briefB._model = mB;
    briefB._provider = pB;

    // Auto-retry if angle or framework is identical
    if (briefB.creative_direction?.angle === briefA.creative_direction?.angle
      || briefB.creative_direction?.framework === briefA.creative_direction?.framework) {
      updateProgressMsg('Option B overlapped with A — retrying…');
      const usrBRetry = usrB + '\n\nWARNING: Your previous attempt reused Option A direction. You MUST choose a different angle AND a different framework.';
      rawB = await makeAPICallWith(sysB, usrBRetry, pB, mB);
      briefB = extractJSON(rawB);
      validateBrief(briefB);
      briefB._model = mB;
      briefB._provider = pB;
    }
    markProgress('b', 'done', `Option B: done (${mB})`);

    state.generated.a = briefA;
    state.generated.b = briefB;
    saveGeneratedDraft();

    hideProgress();
    renderOutput(briefA, briefB);

  } catch(e) {
    hideProgress();
    const errDiv = document.getElementById('gen-error');
    const msg = redactSecrets(e.message);
    if (errDiv) { errDiv.textContent = 'Generation failed: ' + msg; errDiv.style.display = 'block'; }
    else alert('Generation failed: ' + msg);
    if (btn) btn.disabled = false;
  }
}

function validateBrief(brief) {
  brief._flags = [];
  validateRequiredFields(brief);
  validateSubjectPreheaders(brief);
  validateBodyVariants(brief);
  validateCopySafety(brief);
  validateCreativeDirection(brief);
  validateBannerBrief(brief);
  validateBodyOpening(brief);
  validateProductBlocks(brief);
  validateQualityChecks(brief);
}

function addBriefFlag(brief, type, msg) {
  brief._flags.push({ type, msg });
}

function validateRequiredFields(brief) {
  ['creative_direction','subject_lines','theme','banner','body','products','quality_checks'].forEach(field => {
    if (!brief[field]) addBriefFlag(brief, 'error', 'Missing required field: ' + field);
  });
}

function validateSubjectPreheaders(brief) {
  const sl = brief.subject_lines || {};
  state.wizard.segments.forEach(id => {
    const key = segJsonKey(id);
    if (!sl[key]) addBriefFlag(brief, 'error', 'Missing subject/preheader for segment ' + id);
  });

  Object.entries(sl).forEach(([seg, v]) => {
    const subject = v.subject || '';
    const preheader = v.preheader || '';
    if (subject && subject.length > SUBJECT_HARD_MAX)
      addBriefFlag(brief, 'warn', seg + ' subject exceeds hard cap (' + subject.length + ' chars > ' + SUBJECT_HARD_MAX + ')');
    else if (subject && subject.length > SUBJECT_TARGET_MAX)
      addBriefFlag(brief, 'warn', seg + ' subject above target (' + subject.length + ' chars > ' + SUBJECT_TARGET_MAX + ')');
    if (subject && subject.length < SUBJECT_TARGET_MIN)
      addBriefFlag(brief, 'warn', seg + ' subject may be too short to carry a concrete click reason (' + subject.length + ' chars)');
    if (preheader && (preheader.length < 60 || preheader.length > 90))
      addBriefFlag(brief, 'warn', seg + ' preheader length ' + preheader.length + ' (target 60-90)');
    if (hasFirstNameToken(subject) && hasFirstNameToken(preheader))
      addBriefFlag(brief, 'warn', seg + ' repeats {{first_name}} in both subject and preheader.');
    if (similarityScore(subject, preheader) > 0.55)
      addBriefFlag(brief, 'warn', seg + ' subject and preheader are too similar; preheader should add a new beat.');
    const hookHits = HOOK_STACK_WORDS.filter(word => (subject + ' ' + preheader).toLowerCase().includes(word));
    if (hookHits.length >= 4)
      addBriefFlag(brief, 'warn', seg + ' may be stacking too many hooks: ' + hookHits.join(', '));
  });
}

function validateBodyVariants(brief) {
  const body = brief.body || {};
  state.wizard.segments.forEach(id => {
    const key = segJsonKey(id);
    if (!body[key]) addBriefFlag(brief, 'warn', 'Missing body variant for segment ' + id);
  });
}

function validateCopySafety(brief) {
  const fullText = getBriefSearchText(brief);
  SPAM_WORDS.forEach(w => {
    if (fullText.includes(w)) addBriefFlag(brief, 'warn', 'Spam word detected: "' + w + '"');
  });
  WEAK_COPY_PATTERNS.forEach(w => {
    if (fullText.includes(w)) addBriefFlag(brief, 'warn', 'Weak/generic copy pattern: "' + w + '"');
  });
  OPT_OUT_RISK_PATTERNS.forEach(w => {
    if (fullText.includes(w)) addBriefFlag(brief, 'warn', 'Opt-out risk wording: "' + w + '"');
  });
  UNSUPPLIED_PROOF_PATTERNS.forEach(w => {
    if (fullText.includes(w)) addBriefFlag(brief, 'warn', 'Potential invented/unsafe proof: "' + w + '"');
  });

  const intel = getBrandIntel(state.wizard.brand);
  if (!intel) return;
  intel.avoid.forEach(pattern => {
    const scan = pattern.replace(/^hyperbole like\s+/i, '').replace(/\s*\+\s*/g, ' ').toLowerCase();
    if (scan.length > 8 && fullText.includes(scan))
      addBriefFlag(brief, 'warn', 'Brand-specific weak pattern detected: "' + pattern + '"');
  });
}

function validateCreativeDirection(brief) {
  const cd = brief.creative_direction || {};
  if (cd.angle && !VALID_ANGLES.includes(cd.angle))
    addBriefFlag(brief, 'error', 'Invalid angle: ' + cd.angle);
  if (cd.angle && LEGACY_ANGLES.includes(cd.angle))
    addBriefFlag(brief, 'warn', 'Legacy angle name used; prefer playbook angles: ' + PLAYBOOK_ANGLES.join(', '));
  if (cd.framework && !VALID_FRAMEWORKS.includes(cd.framework))
    addBriefFlag(brief, 'error', 'Invalid framework: ' + cd.framework);
  if (cd.framework && LEGACY_FRAMEWORKS.includes(cd.framework))
    addBriefFlag(brief, 'warn', 'Legacy framework used; prefer playbook frameworks: ' + PLAYBOOK_FRAMEWORKS.join(', '));

  const hook = cd.hook_contract || {};
  ['segment_insight','emotion','hero_product','proof_or_price','urgency','avoid_rule'].forEach(field => {
    if (!hook[field]) addBriefFlag(brief, 'warn', 'Hook contract missing: ' + field);
  });
}

function validateBannerBrief(brief) {
  const banner = brief.banner || {};
  if (banner.main_text) {
    banner.main_text.split(/\n|<br\s*\/?>/i).forEach(line => {
      if (wordCount(line) > 8) addBriefFlag(brief, 'warn', 'Banner line over 8 words: "' + line.trim() + '"');
    });
  }
  if (banner.cta && (wordCount(banner.cta) < 2 || wordCount(banner.cta) > 4))
    addBriefFlag(brief, 'warn', 'Banner CTA should be 2-4 words: "' + banner.cta + '"');
  if (banner.cta && WEAK_CTA_PATTERNS.includes(banner.cta.toLowerCase()))
    addBriefFlag(brief, 'warn', 'Weak/vague banner CTA: "' + banner.cta + '"');
}

function validateBodyOpening(brief) {
  const opener = getOpeningText(brief, 250);
  if (BULLET_OPENER_PATTERN.test(opener))
    addBriefFlag(brief, 'warn', 'Body appears to open with a bullet/checkmark list; playbook prefers micro-story or direct problem.');
  const heroName = selectedProductNames()[0] || '';
  if (heroName && !normalizeText(getOpeningText(brief)).includes(normalizeText(heroName)))
    addBriefFlag(brief, 'warn', 'Body opener does not mention the selected hero product early.');
}

function validateProductBlocks(brief) {
  const selectedProducts = getWizardProducts().length;
  const outputProducts = brief.products || [];
  if (outputProducts.length < selectedProducts) addBriefFlag(brief, 'warn', 'Generated fewer product blocks than selected products.');
  if (state.wizard.brand !== 'SantaFare' && outputProducts.length > 6)
    addBriefFlag(brief, 'warn', '7+ product blocks often matched overcrowded fail templates for BG/GL/LF.');
  if (state.wizard.brand !== 'SantaFare' && selectedProducts >= 4 && outputProducts.length > 0 && outputProducts.length < 4)
    addBriefFlag(brief, 'warn', 'Product grid below 4 products; playbook default is 4-6 for BG/GL/LF.');
  if (state.wizard.brand === 'SantaFare' && outputProducts.length > 0 && outputProducts.length !== 4)
    addBriefFlag(brief, 'warn', 'SantaFare should default to 4 products unless the brief gives a clear exception.');
  if (isSantaFarePaused(state.wizard.brand, state.wizard.date))
    addBriefFlag(brief, 'warn', 'SantaFare is seasonally paused through Oct 2026; validate that this send is truly needed.');

  const offerNumbers = (getFullOfferValue() || '').match(/\d+(?:\.\d+)?/g) || [];
  outputProducts.forEach((p, i) => validateOneProductBlock(brief, p, i, offerNumbers));
}

function validateOneProductBlock(brief, p, i, offerNumbers) {
  if (!p.name) addBriefFlag(brief, 'warn', 'Product block ' + (i + 1) + ' missing name.');
  if (wordCount(p.main_text) > 5) addBriefFlag(brief, 'warn', 'Product block ' + (i + 1) + ' main text over 5 words.');
  if (!Array.isArray(p.usps) || p.usps.length < 2) addBriefFlag(brief, 'warn', 'Product block ' + (i + 1) + ' needs at least 2 USPs.');
  if (p.cta && (wordCount(p.cta) < 2 || wordCount(p.cta) > 4))
    addBriefFlag(brief, 'warn', 'Product block ' + (i + 1) + ' CTA should be 2-4 words.');
  if (p.cta && WEAK_CTA_PATTERNS.includes(p.cta.toLowerCase()))
    addBriefFlag(brief, 'warn', 'Product block ' + (i + 1) + ' uses weak/vague CTA: "' + p.cta + '"');
  if (offerNumbers.length && !offerNumbers.some(n => JSON.stringify(p).includes(n)))
    addBriefFlag(brief, 'warn', 'Product block ' + (i + 1) + ' may be missing visible price/offer context.');
}

function validateQualityChecks(brief) {
  const qc = brief.quality_checks || {};
  PLAYBOOK_REQUIRED_QA.forEach(field => {
    if (!qc[field]) addBriefFlag(brief, 'warn', 'Quality check missing: ' + field);
  });
}

function getBriefScore(brief) {
  const flags = brief?._flags || [];
  const errors = flags.filter(f => f.type === 'error').length;
  const warnings = flags.filter(f => f.type !== 'error').length;
  return Math.max(0, 100 - errors * 25 - warnings * 6);
}

function showProgress() {

  const mB = state.modelB || state.model;

  <div class="progress-title" id="progress-msg">Generating brief…</div>
  <div class="prog-steps">

  </div>

function updateProgressMsg(msg) {
  const el = document.getElementById('progress-msg');
  if (el) el.textContent = msg;
}

function markProgress(id, status, label) {

function hideProgress() {

}

function clearOutput() {

function regenerate() {

// ── OUTPUT RENDERER ───────────────────────────────────────────
function renderOutput(briefA, briefB) {
  const panel = document.getElementById('output-panel');
  panel.classList.add('open');
  panel.innerHTML = `
<div class="output-toolbar">
  <h2>Generated Brief — ${escHtml(state.wizard.brand || '')} · ${escHtml(state.wizard.date || '')}</h2>
  <div class="output-actions">
    <button class="btn btn-secondary" onclick="exportToExcel()">Export to Excel</button>
    <button class="btn btn-secondary" onclick="regenerate()">Regenerate</button>
  </div>
</div>
<div class="output-cols">
  <div id="opt-col-a">${renderOption('A', briefA)}</div>
  <div id="opt-col-b">${renderOption('B', briefB)}</div>
</div>
${renderRefinePanel()}`;
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderOption(label, brief) {
  if (!brief) return '';
  const flags = (brief._flags || []).map(f =>
    `<div class="flag-${f.type}" style="font-size:11px;margin-bottom:4px">${escHtml(f.type.toUpperCase())}: ${escHtml(f.msg)}</div>`
  ).join('');
  const modelTag = brief._model
    ? `<span class="model-tag">${escHtml(brief._model)}</span>`
    : '';
  return `
<div class="opt-card">
  <div class="opt-card-hdr">
    <h3>Option ${label}${modelTag}</h3>
    <button class="btn-copy-full" onclick="copyFullBrief('${label}')">Copy full</button>
  </div>
  ${flags ? `<div class="out-section">${flags}</div>` : ''}
  ${renderQualitySection(brief)}
  ${renderDirectionSection(brief)}
  ${renderSubjectSection(brief)}
  ${renderThemeSection(brief)}
  ${renderBannerSection(brief)}
  ${renderBodySection(brief)}
  ${renderProductsSection(brief)}
</div>`;
}

function renderQualitySection(brief) {
  const score = getBriefScore(brief);
  const flags = brief._flags || [];
  const errors = flags.filter(f => f.type === 'error').length;
  const warnings = flags.filter(f => f.type !== 'error').length;
  const q = brief.quality_checks || {};
  const html = `
  <div class="quality-strip">
    <div class="quality-score">${score}<span>score</span></div>
    <div class="quality-meta">
      <strong>${errors ? errors + ' blocking issue(s)' : 'No blocking issues'}</strong><br>
      ${warnings ? warnings + ' warning(s) to review' : 'No warnings detected'}
    </div>
  </div>
  <div class="qc-grid">
    ${PLAYBOOK_REQUIRED_QA.map(field => `
    <div class="qc-item"><strong>${escHtml(field.replace(/_/g, ' '))}</strong>${escHtml(q[field] || 'Not supplied')}</div>`).join('')}
  </div>`;
  return outSection('Quality Gate', html);
}

function renderDirectionSection(brief) {
  const d = brief.creative_direction || {};
  const h = d.hook_contract || {};
  const hookRows = Object.keys(h).length ? `
    <br><strong>Hook Contract:</strong><br>
    Segment: ${escHtml(h.segment_insight || '—')}<br>
    Emotion: ${escHtml(h.emotion || '—')}<br>
    Hero: ${escHtml(h.hero_product || '—')}<br>
    Proof/price: ${escHtml(h.proof_or_price || '—')}<br>
    Urgency: ${escHtml(h.urgency || '—')}<br>
    Avoid: ${escHtml(h.avoid_rule || '—')}` : '';
  const html = `<div class="direction-box">
    <strong>Angle:</strong> ${escHtml(d.angle || '—')}<br>
    <strong>Framework:</strong> ${escHtml(d.framework || '—')}<br>
    <strong>Flow:</strong> ${escHtml(d.flow || '—')}<br>
    <strong>Differentiator:</strong> ${escHtml(d.differentiator || '—')}${hookRows}
  </div>`;
  return outSection('Creative Direction', html);
}

function renderSubjectSection(brief) {
  const sl = brief.subject_lines || {};
  const rows = Object.entries(sl).map(([seg, v]) => {
    const label = seg.replace('seg_', 'Seg ').replace('_', '-');
    return `<div style="margin-bottom:8px">
      <div class="out-label">${escHtml(label)}</div>
      <div style="font-weight:600">${escHtml(v.subject || '')}</div>
      <div class="out-muted small">${escHtml(v.preheader || '')}</div>
    </div>`;
  }).join('');
  return outSection('Subject Lines & Preheaders', rows);
}

function renderThemeSection(brief) {
  return outSection('Theme (Visual Brief)', `<div class="out-content">${escHtml(brief.theme || '')}</div>`);
}

function renderBannerSection(brief) {
  const b = brief.banner || {};
  const parts = [
    b.logo_stars && `<div class="out-muted small">${escHtml(b.logo_stars)}</div>`,
    b.main_text  && `<div style="font-weight:700;font-size:14px;margin:5px 0">${escHtml(b.main_text)}</div>`,
    b.sub_text   && `<div class="out-muted">${escHtml(b.sub_text)}</div>`,
    b.image_guidance && `<div style="background:#f7fbf8;border-radius:6px;padding:6px 10px;margin:5px 0;font-size:11px"><strong>Image:</strong> ${escHtml(b.image_guidance)}</div>`,
    b.review_quote && `<div style="font-style:italic;border-left:2px solid var(--border);padding-left:8px;margin:5px 0;font-size:12px">${escHtml(b.review_quote)}</div>`,
    b.cta && `<div style="margin-top:5px"><strong class="banner-cta-text">${escHtml(b.cta)}</strong></div>`
  ].filter(Boolean).join('');
  return outSection('Banner', parts);
}

function renderBodySection(brief) {
  const body = brief.body || {};
  let html = '';
  if (body.base) {
    html += `<div style="margin-bottom:10px"><div class="out-sec-title" style="margin-bottom:4px">Base</div><div class="out-content">${escHtml(body.base)}</div></div>`;
  }
  Object.entries(body).forEach(([k, v]) => {
    if (k === 'base') return;
    const lbl = k.replace('seg_', 'Seg ').replace('_', '-');
    html += `<div style="margin-bottom:10px"><div class="out-sec-title" style="margin-bottom:4px">${escHtml(lbl)}</div><div class="out-content">${escHtml(v)}</div></div>`;
  });
  return outSection('Body Copy', html);
}

function renderProductsSection(brief) {
  const prods = brief.products || [];
  const grid = `<div class="prod-grid-out">
    ${prods.map(p => `
    <div class="prod-block">
      <div class="prod-name">${escHtml(p.name || '')}</div>
      <div class="prod-main">${escHtml(p.main_text || '')}</div>
      <div class="prod-sub">${escHtml(p.sub_text || '')}</div>
      ${p.popup_badge ? `<div class="prod-badge">${escHtml(p.popup_badge)}</div>` : ''}
      ${(p.usps || []).map(u => `<div class="prod-usp">${escHtml(u)}</div>`).join('')}
      ${p.review ? `<div class="prod-review">${escHtml(p.review)}</div>` : ''}
      <button class="prod-cta">${escHtml(p.cta || 'SHOP NOW')}</button>
    </div>`).join('')}
  </div>`;
  return outSection('Product Blocks', grid);
}

function outSection(title, html) {
  return `
<div class="out-section">
  <div class="out-sec-hdr">
    <span class="out-sec-title">${title}</span>
    <button class="btn-copy-sec" onclick="copySection(this)" aria-label="Copy ${escHtml(title)} section">Copy</button>
  </div>
  ${html}
</div>`;
}

function copySection(btn) {
  const section = btn.closest('.out-section');
  const text = section.innerText.replace(/^Copy$/gm, '').trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  }).catch(() => alert('Copy failed — try selecting and copying manually.'));
}

function copyFullBrief(label) {
  const brief = label === 'A' ? state.generated.a : state.generated.b;
  if (!brief) return;
  const text = briefToPlainText(brief);
  navigator.clipboard.writeText(text).then(() => {
    alert('Option ' + label + ' copied to clipboard!');
  }).catch(() => alert('Copy failed — try selecting manually.'));
}

function briefToPlainText(brief) {
  const d = brief.creative_direction || {};
  const h = d.hook_contract || {};
  const q = brief.quality_checks || {};
  const lines = [
    '=== CREATIVE DIRECTION ===',
    'Angle: ' + (d.angle || ''), 'Framework: ' + (d.framework || ''),
    'Flow: ' + (d.flow || ''), 'Differentiator: ' + (d.differentiator || ''),
    '',
    '=== HOOK CONTRACT ===',
    'Segment insight: ' + (h.segment_insight || ''),
    'Emotion: ' + (h.emotion || ''),
    'Hero product: ' + (h.hero_product || ''),
    'Proof/price: ' + (h.proof_or_price || ''),
    'Urgency: ' + (h.urgency || ''),
    'Avoid rule: ' + (h.avoid_rule || ''),
    '',
    '=== SUBJECT LINES & PREHEADERS ===',
    ...Object.entries(brief.subject_lines || {}).flatMap(([seg, v]) => [
      seg.replace('seg_', 'SEG ').replace('_', '-') + ': ' + (v.subject || ''),
      'Preheader: ' + (v.preheader || ''), ''
    ]),
    '=== THEME ===', brief.theme || '', '',
    '=== BANNER ===',
    ...[brief.banner?.main_text, brief.banner?.sub_text, brief.banner?.image_guidance,
        brief.banner?.review_quote, 'CTA: ' + brief.banner?.cta].filter(Boolean), '',
    '=== BODY COPY ===',
    ...Object.entries(brief.body || {}).flatMap(([k, v]) => [
      '--- ' + k.replace('seg_', 'SEG ').replace('_', '-').toUpperCase() + ' ---', v, ''
    ]),
    '=== PRODUCT BLOCKS ===',
    ...(brief.products || []).flatMap(p => [
      '[' + p.slot + '] ' + p.name, p.main_text, p.sub_text, p.popup_badge,
      ...(p.usps || []).map(u => '+ ' + u), p.review, 'CTA: ' + p.cta, ''
    ]),
    '=== QUALITY GATE ===',
    ...PLAYBOOK_REQUIRED_QA.flatMap(field => [
      field.replace(/_/g, ' ') + ': ' + (q[field] || '')
    ])
  ];
  return lines.join('\n');
}

// ── REFINEMENT ────────────────────────────────────────────────
function renderRefinePanel() {
  const hasRevisions = state.revisions.length > 0;
  return `
<div class="refine-panel" style="margin-top:16px">
  <h3>Refine this brief</h3>
  <div class="refine-scope">
    <label><input type="radio" name="refine-scope" value="both" checked> Both options</label>
    <label><input type="radio" name="refine-scope" value="a"> Option A only</label>
    <label><input type="radio" name="refine-scope" value="b"> Option B only</label>
  </div>
  <textarea class="refine-textarea" id="refine-input"
    placeholder='Describe your changes, e.g:&#10;• "Make subject lines more urgent for seg 45"&#10;• "Shorten body copy — max 3 paragraphs, no P.S."&#10;• "Change banner headline to focus on the price point"&#10;• "Switch Option B angle to Social Proof"'></textarea>
  <div class="refine-actions">
    <button class="btn btn-primary" onclick="applyRefinement()">Apply Changes</button>
    <button class="btn-undo ${hasRevisions ? 'visible' : ''}" id="undo-btn" onclick="undoRefinement()">Undo last change</button>
  </div>
</div>`;
}

async function applyRefinement() {
  const changes = document.getElementById('refine-input')?.value?.trim();
  if (!changes) { alert('Please describe the changes you want.'); return; }

  const scope = document.querySelector('input[name="refine-scope"]:checked')?.value || 'both';
  const applyToA = scope === 'both' || scope === 'a';
  const applyToB = scope === 'both' || scope === 'b';

  // Push current state to revision stack (max 5)
  if (state.revisions.length >= 5) state.revisions.shift();
  state.revisions.push({ a: state.generated.a, b: state.generated.b });

  const applyBtn = document.querySelector('.refine-actions .btn-primary');
  if (applyBtn) applyBtn.disabled = true;

  try {
    const [newA, newB] = await Promise.all([
      applyToA && state.generated.a ? refineOption(state.generated.a, changes) : Promise.resolve(state.generated.a),
      applyToB && state.generated.b ? refineOption(state.generated.b, changes) : Promise.resolve(state.generated.b)
    ]);

    state.generated.a = newA;
    state.generated.b = newB;
    saveGeneratedDraft();
    renderOutput(newA, newB);
  } catch(e) {
    // Revert on failure
    const prev = state.revisions.pop();
    if (prev) { state.generated.a = prev.a; state.generated.b = prev.b; }
    alert('Refinement failed: ' + e.message);
  } finally {
    if (applyBtn) applyBtn.disabled = false;
  }
}

async function refineOption(existingBrief, changes) {
  const w = state.wizard;
  const brand = getBrandConfig(w.brand);
  const sys = [
    'You are an expert email copywriter for ' + w.brand + '. Persona: ' + brand.persona + '.',
    PLAYBOOK_RULES,
    PROMPT_CONTRACT,
    PLAYBOOK_ENFORCEMENT,
    buildPerformanceContext(),
    'Return ONLY valid JSON — no prose, no markdown fences.'
  ].join('\n');
  const user = buildRefinementPrompt(existingBrief, changes);
  const raw = await makeAPICall(sys, user);
  const refined = extractJSON(raw);
  validateBrief(refined);
  return refined;
}

function undoRefinement() {
  if (!state.revisions.length) return;
  const prev = state.revisions.pop();
  state.generated.a = prev.a;
  state.generated.b = prev.b;
  saveGeneratedDraft();
  renderOutput(prev.a, prev.b);
}

// ── EXCEL EXPORT ─────────────────────────────────────────────
function exportToExcel() {
  const { a, b } = state.generated;
  if (!a && !b) { alert('Generate a brief first.'); return; }
  const wb = XLSX.utils.book_new();
  const brand = state.wizard.brand || 'Brand';
  const date  = state.wizard.date  || 'Date';
  const d = new Date(date + 'T12:00:00');
  const dayPart = isNaN(d.getTime()) ? date
    : d.toLocaleDateString('en-US', { weekday:'short', day:'2-digit', month:'short', year:'2-digit' }).replace(/,/g,'');

  if (a) {
    const ws = briefToSheet(a);
    const name = (brand + '_' + dayPart + '_A').slice(0, 31);
    XLSX.utils.book_append_sheet(wb, ws, name);
  }
  if (b) {
    const ws = briefToSheet(b);
    const name = (brand + '_' + dayPart + '_B').slice(0, 31);
    XLSX.utils.book_append_sheet(wb, ws, name);
  }
  XLSX.writeFile(wb, brand + '_brief_' + date + '.xlsx');
}

function briefToSheet(brief) {
  const rows = [];
  const addRow = (col2, col3, col4, col5) => {
    rows.push([null, col2 || null, col3 || null, col4 || null, col5 || null]);
  };

  // Spacer
  rows.push([null, null, null, null, null]);

  const d = brief.creative_direction || {};
  const h = d.hook_contract || {};
  addRow('Angle', d.angle || '', 'Framework', d.framework || '');
  addRow('Flow', d.flow || '', 'Differentiator', d.differentiator || '');
  addRow('Hook Contract', [
    'Segment: ' + (h.segment_insight || ''),
    'Emotion: ' + (h.emotion || ''),
    'Hero: ' + (h.hero_product || ''),
    'Proof/price: ' + (h.proof_or_price || ''),
    'Urgency: ' + (h.urgency || ''),
    'Avoid: ' + (h.avoid_rule || '')
  ].join('\n'));
  rows.push([null, null, null, null, null]);

  // Subject lines + preheaders — paired 2-per-row
  const segs = Object.entries(brief.subject_lines || {});
  for (let i = 0; i < segs.length; i += 2) {
    const [k1, v1] = segs[i];
    const [k2, v2] = segs[i + 1] || [null, null];
    const s1 = k1.replace('seg_', '').replace('_', '-');
    const s2 = k2 ? k2.replace('seg_', '').replace('_', '-') : null;
    addRow('Subject ' + s1, v1?.subject || '', s2 ? 'Subject ' + s2 : null, v2?.subject || '');
    addRow('PreHeader ' + s1, v1?.preheader || '', s2 ? 'PreHeader ' + s2 : null, v2?.preheader || '');
  }
  // Remaining odd segment
  if (segs.length % 2 !== 0) {
    const [k, v] = segs[segs.length - 1];
    const s = k.replace('seg_', '').replace('_', '-');
    addRow('Subject ' + s, v?.subject || '');
    addRow('PreHeader ' + s, v?.preheader || '');
  }

  rows.push([null, null, null, null, null]);

  // Theme, Banner, Body
  addRow('Theme', brief.theme || '');

  const b = brief.banner || {};
  const bannerText = [
    b.logo_stars, 'Main text: ' + (b.main_text || ''), 'Sub text: ' + (b.sub_text || ''),
    'Image: ' + (b.image_guidance || ''), 'Review: ' + (b.review_quote || ''), 'CTA: ' + (b.cta || '')
  ].filter(Boolean).join('\n');
  addRow('Banner', bannerText);

  const bodyText = Object.entries(brief.body || {}).map(([k, v]) =>
    (k === 'base' ? 'Base' : k.replace('seg_', 'SEG ').replace('_', '-').toUpperCase()) + '\n' + v
  ).join('\n\n');
  addRow('Body', bodyText);

  const q = brief.quality_checks || {};
  addRow('Quality Gate', PLAYBOOK_REQUIRED_QA.map(field =>
    field.replace(/_/g, ' ') + ': ' + (q[field] || '')
  ).join('\n'));

  addRow('Ảnh sản phẩm', 'Layout tương tự temp trước\n- Gồm ảnh mẫu mặc sản phẩm\n- Hình phụ phù hợp');

  rows.push([null, null, null, null, null]);

  // Products in 2-up pairs
  const prods = brief.products || [];
  for (let i = 0; i < prods.length; i += 2) {
    const p1 = prods[i];
    const p2 = prods[i + 1];
    const makeText = p => p ? [
      'Product image: ' + p.name,
      'Main text: ' + (p.main_text || ''),
      'Sub text: ' + (p.sub_text || ''),
      p.popup_badge ? 'Popout: ' + p.popup_badge : '',
      ...(p.usps || []).map(u => '+ ' + u),
      p.review ? 'Review: ' + p.review : ''
    ].filter(Boolean).join('\n') : '';

    addRow('Product ' + (i + 1), makeText(p1), p2 ? 'Product ' + (i + 2) : null, makeText(p2));
    addRow(null, p1 ? 'CTA: ' + (p1.cta || '') : '', p2 ? null : null, p2 ? 'CTA: ' + (p2.cta || '') : '');
    rows.push([null, null, null, null, null]);
  }

  const wsData = rows;
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{ wch: 3 }, { wch: 18 }, { wch: 70 }, { wch: 18 }, { wch: 70 }];
  return ws;
}

// ── PERSISTENCE ───────────────────────────────────────────────
function safeGetStorage(key) {
  try {
    return localStorage.getItem(key);
  } catch (e) {
    return null;
  }
}

function safeSetStorage(key, value) {
  try {
    localStorage.setItem(key, value);
    return true;
  } catch (e) {
    return false;
  }
}

function saveDraft() {
  const w = state.wizard;
  if (!w.brand) return;
  const draft = {
    offerType: w.offerType, offerValue: w.offerValue,
    offerShipping: w.offerShipping || '',
    urgency: w.urgency,
    products: w.products,
    lastCTR: w.lastCTR, lastHero: w.lastHero, lastAngle: w.lastAngle, lastNote: w.lastNote
  };
  safeSetStorage('draft_' + w.brand, JSON.stringify(draft));
}

function loadDraft(brand) {
  try {
    const raw = safeGetStorage('draft_' + brand);
    if (!raw) return;
    const d = JSON.parse(raw);
    const w = state.wizard;
    if (d.products) {
      w.products = d.products.map(p => ({
        ...p,
        usps: Array.isArray(p.usps) ? p.usps.filter(Boolean) : [],
        scrapedUsps: p.scrapedUsps || []
      }));
    }
    if (d.offerType) w.offerType = d.offerType;
    if (d.offerValue) w.offerValue = d.offerValue;
    if (d.offerShipping !== undefined) w.offerShipping = d.offerShipping || '';
    if (d.urgency) w.urgency = d.urgency;
    if (d.lastCTR) w.lastCTR = d.lastCTR;
    if (d.lastHero) w.lastHero = d.lastHero;
    if (d.lastAngle) w.lastAngle = d.lastAngle;
    if (d.lastNote) w.lastNote = d.lastNote;
  } catch(e) {
    return;
  }
}

function generatedDraftKey() {
  const w = state.wizard;
  if (!w.brand || !w.date) return '';
  return 'generated_' + w.brand + '_' + w.date;
}

function hasGeneratedDraft() {
  const key = generatedDraftKey();
  return !!(key && safeGetStorage(key));
}

function saveGeneratedDraft() {
  const key = generatedDraftKey();
  if (!key) return;
  const payload = {
    savedAt: new Date().toISOString(),
    brand: state.wizard.brand,
    date: state.wizard.date,
    provider: state.provider,
    model: state.model,
    a: state.generated.a,
    b: state.generated.b
  };
  safeSetStorage(key, JSON.stringify(payload));
}

function loadGeneratedDraft() {
  const key = generatedDraftKey();
  if (!key) return;
  try {
    const raw = safeGetStorage(key);
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.a) validateBrief(d.a);
    if (d.b) validateBrief(d.b);
    state.generated.a = d.a || null;
    state.generated.b = d.b || null;
    renderOutput(state.generated.a, state.generated.b);
  } catch(e) {
    alert('Could not load saved brief: ' + redactSecrets(e.message));
  }
}

// ── INIT ─────────────────────────────────────────────────────
function init() {
  updateModelOptions();
  document.getElementById('provider-select').addEventListener('change', e => {
    state.provider = e.target.value;
    updateModelOptions();
    refreshApiKeyPlaceholder();
  });
  document.getElementById('model-select').addEventListener('change', e => { state.model = e.target.value; });
  renderWizard();
}

// Expose escHtml globally for inline onclick handlers in dynamically generated HTML
window.escHtml = escHtml;

document.addEventListener('DOMContentLoaded', init);
</script>
